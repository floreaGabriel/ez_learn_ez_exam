name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: floreagabriel/ez_learn_ez_exam

jobs:
  # ── Pas 1: detectează CE s-a modificat la acest push ────────────────────────
  # Setează un flag true/false pentru fiecare imagine. Build-ul de mai jos
  # construiește DOAR imaginile cu flag true => push-uri mult mai rapide.
  changes:
    runs-on: ubuntu-latest
    outputs:
      site:         ${{ steps.filter.outputs.site }}
      counter:      ${{ steps.filter.outputs.counter }}
      sqlrunner:    ${{ steps.filter.outputs.sqlrunner }}
      conquistador: ${{ steps.filter.outputs.conquistador }}
      amongus:      ${{ steps.filter.outputs.amongus }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # istoric complet ca să putem face diff cu commitul anterior

      - name: Detect changed paths
        id: filter
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          ZERO='0000000000000000000000000000000000000000'

          # Prima dată / base necunoscut / force-push: construim TOT (fallback sigur).
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "Base indisponibil ($BEFORE) — construiesc toate imaginile."
            FILES=$(git ls-files)
          else
            FILES=$(git diff --name-only "$BEFORE" '${{ github.sha }}')
          fi

          echo "── Fișiere modificate ──"
          echo "$FILES"
          echo "────────────────────────"

          # Backend-uri: imaginea se reface doar dacă s-a atins directorul ei.
          grep -qE '^counter/'      <<< "$FILES" && counter=true      || counter=false
          grep -qE '^sqlrunner/'    <<< "$FILES" && sqlrunner=true    || sqlrunner=false
          grep -qE '^conquistador/' <<< "$FILES" && conquistador=true || conquistador=false
          grep -qE '^amongus/'      <<< "$FILES" && amongus=true      || amongus=false

          # Site static (context "."): se reface la ORICE modificare care NU e
          # exclusiv în directoarele de backend (acelea sunt excluse din
          # imaginea statică prin .dockerignore). Mai sigur: rebuild dacă e dubiu.
          grep -qvE '^(counter|sqlrunner|conquistador|amongus)/' <<< "$FILES" && site=true || site=false

          {
            echo "site=$site"
            echo "counter=$counter"
            echo "sqlrunner=$sqlrunner"
            echo "conquistador=$conquistador"
            echo "amongus=$amongus"
          } >> "$GITHUB_OUTPUT"

          echo "Rezultat => site=$site counter=$counter sqlrunner=$sqlrunner conquistador=$conquistador amongus=$amongus"

  # ── Pas 2: build & push — fiecare imagine doar dacă flag-ul ei e true ───────
  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necesar ca sa poata scrie in GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # QEMU mai nou (binfmt) — repară "signal 4 Illegal instruction" la
          # npm install / Node sub emulare arm64 pe runnerele amd64.
          image: tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (site static)
        if: needs.changes.outputs.site == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            ASSET_VER=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push image (counter — backend live/total)
        if: needs.changes.outputs.counter == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./counter
          file: ./counter/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_counter:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_counter:${{ github.sha }}

      - name: Build and push image (sqlrunner — backend Interogare Live)
        if: needs.changes.outputs.sqlrunner == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./sqlrunner
          file: ./sqlrunner/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_sqlrunner:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_sqlrunner:${{ github.sha }}

      - name: Build and push image (conquistador — joc multiplayer)
        if: needs.changes.outputs.conquistador == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./conquistador
          file: ./conquistador/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_conquistador:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_conquistador:${{ github.sha }}

      - name: Build and push image (amongus — joc multiplayer Among Us CS)
        if: needs.changes.outputs.amongus == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./amongus
          file: ./amongus/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_amongus:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_amongus:${{ github.sha }}
