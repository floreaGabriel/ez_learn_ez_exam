name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: floreagabriel/ez_learn_ez_exam 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necesar ca sa poata scrie in GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # QEMU mai nou (binfmt) — repară "signal 4 Illegal instruction" la
          # npm install / Node sub emulare arm64 pe runnerele amd64.
          image: tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (site static)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            ASSET_VER=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push image (counter — backend live/total)
        uses: docker/build-push-action@v6
        with:
          context: ./counter
          file: ./counter/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_counter:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_counter:${{ github.sha }}

      - name: Build and push image (sqlrunner — backend Interogare Live)
        uses: docker/build-push-action@v6
        with:
          context: ./sqlrunner
          file: ./sqlrunner/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_sqlrunner:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_sqlrunner:${{ github.sha }}

      - name: Build and push image (conquistador — joc multiplayer)
        uses: docker/build-push-action@v6
        with:
          context: ./conquistador
          file: ./conquistador/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_conquistador:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}_conquistador:${{ github.sha }}