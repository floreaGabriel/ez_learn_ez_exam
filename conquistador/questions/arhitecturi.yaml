    variante:
      - "Schimbă procesorul în modul protejat"
      - "Șterge liniile cache vechi"
      - "Identifică un pattern în secvența de MISS-uri și preia în avans datele
        ce vor fi probabil utilizate în viitorul apropiat"
      - "Înmulțește registrul segment cu 10H"
    corect: 2
    explicatie: "Citirea secvențială (predictibilă) din memorie permite CPU să
      identifice un pattern în secvența de MISS-uri și să preia în avans datele,
      menținând cache-ul cu un pas înaintea procesării."

  - tip: grila
    dificultate: licenta
    enunt: "Ce face procesorul prin replanificarea (reordonarea) execuției
      instrucțiunilor?"
    variante:
      - "Elimină memoria cache"
      - "Forțează toate salturile să fie efectuate"
      - "Execută instrucțiunile strict în ordinea din cod"
      - "Execută blocurile de instrucțiuni complet independente într-o ordine
        arbitrară, fără a respecta ordinea din program"
    corect: 3
    explicatie: "Blocurile de instrucțiuni complet independente (registri diferiți,
      adrese diferite) pot fi executate fără a ține cont de ordine; în cazul
