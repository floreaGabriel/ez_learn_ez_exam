# ============================================================
#  Banca de întrebări — PROGRAMARE ORIENTATĂ PE OBIECTE (C++)
#  Nivel: examen de licență. Trei tipuri:
#    - grila          : 4 variante, "corect" = indexul (de la 0)
#    - numeric_exact  : răspuns STRICT
#    - numeric_aprox  : estimare, câștigă cine se apropie cel mai mult
#  Câmpul "explicatie" se arată DUPĂ răspuns (rol educativ).
# ============================================================
topic: oop-cpp
nume: "Programare orientată pe obiecte (C++)"
intrebari:
  # ---------- Clase și obiecte / încapsulare ----------
  - tip: grila
    dificultate: licenta
    enunt: "În C++, care este diferența între o declarație de tip struct și una de
      tip class?"
    variante:
      - "Nu există nicio diferență, sunt sinonime perfecte"
      - "La struct membrii sunt implicit public, la class sunt implicit private"
      - "struct nu poate avea metode, class poate"
      - "class nu permite moștenire, struct permite"
    corect: 1
    explicatie: "Singura diferență reală: la struct membrii (date și funcții) sunt
      implicit public, iar la class sunt implicit private."

  - tip: grila
    dificultate: licenta
    enunt: "Principiul de încapsulare în OOP presupune în principal că:"
    variante:
      - "Toate metodele trebuie să fie statice"
      - "Datele sunt ascunse, iar accesul se face prin metode publice de acces"
      - "Datele membre se accesează direct din exterior pentru viteză"
      - "O clasă nu poate conține obiecte ale altei clase"
    corect: 1
    explicatie: "Încapsularea înseamnă ascunderea datelor (de regulă private),
      expunând în exterior doar funcționalitatea prin metode publice."

  # ---------- Constructori și destructori ----------
  - tip: grila
    dificultate: licenta
    enunt: "Care afirmație despre constructori în C++ este corectă?"
    variante:
      - "Trebuie obligatoriu să aibă cel puțin un parametru"
      - "Au întotdeauna tipul de return void"
      - "Pot returna orice tip definit de utilizator"
      - "Au același nume ca al clasei și nu returnează nimic (nici void)"
    corect: 3
    explicatie: "Constructorul are obligatoriu același nume ca al clasei, poate avea
      sau nu parametri și nu returnează nimic, nici măcar void."

  - tip: grila
    dificultate: licenta
    enunt: "Dacă într-o clasă se declară cel puțin un constructor (cu parametri), ce
      se întâmplă cu constructorul implicit fără parametri?"
    variante:
      - "Compilatorul nu îl mai generează automat"
      - "Devine privat automat"
      - "Este moștenit din clasa std::object"
      - "Este generat oricum automat de compilator"
    corect: 0
    explicatie: "Dacă programatorul declară cel puțin un constructor, compilatorul
      nu mai generează automat constructorul implicit fără parametri."

  - tip: grila
    dificultate: licenta
    enunt: "Constructorul de copiere implicit (default copy constructor) realizează:"
    variante:
      - "O copiere bit-cu-bit (bitwise copy) a membrilor"
      - "Apelul automat al destructorului"
      - "O copiere profundă (deep copy) a tuturor pointerilor"
      - "Nimic, obiectul rămâne neinițializat"
    corect: 0
    explicatie: "Constructorul de copiere implicit face o copiere bit-cu-bit; de
      aceea pentru membri pointeri alocați dinamic devine necesar un constructor
      de copiere explicit."

  - tip: grila
    dificultate: licenta
    enunt: "În care dintre situațiile de mai jos NU se apelează constructorul de
      copiere?"
    variante:
      - "Vector V2 = V1; — inițializare la declarare"
      - "Vector V2(V1); — inițializarea unui obiect pe baza altuia"
      - "Vector &V5 = V1; — declararea unei referințe la un obiect existent"
      - "Transmiterea unui obiect ca parametru prin valoare"
    corect: 2
    explicatie: "O referință la un obiect existent nu creează un obiect nou, deci nu
      se apelează niciun constructor; în celelalte cazuri se apelează
      constructorul de copiere."

  - tip: grila
    dificultate: licenta
    enunt: "Care este numele și forma corectă a destructorului pentru clasa Vector?"
    variante:
      - "~Vector(); fără parametri și fără tip de return"
      - "delete Vector();"
      - "void ~Vector();"
      - "Vector ~Vector(int);"
    corect: 0
    explicatie: "Destructorul are forma ~Nume_Clasa(), nu primește parametri și nu
      returnează nimic; o clasă are un singur destructor."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "O clasă Vector conține ca membri doi obiecte de tip Point (start și
      end). La instanțierea unui singur obiect Vector, câți constructori se
      apelează în total (cei doi Point plus Vector)?"
    corect: 3
    explicatie: "Mai întâi se construiesc cele două obiecte Point (2 constructori),
      apoi obiectul Vector (1 constructor) — în total 3."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Câți destructori poate avea, cel mult, o clasă în C++?"
    corect: 1
    explicatie: "O clasă poate avea mai mulți constructori, dar un singur destructor."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Se execută secvența: Vector V1(\"V1\",1,2,3,4); Vector V2(V1); Vector
      V3; — în câte dintre aceste trei declarații se apelează constructorul de
      copiere?"
    corect: 1
    explicatie: "Doar V2(V1) apelează constructorul de copiere; V1 folosește
      constructorul cu parametri, iar V3 constructorul fără parametri."

  # ---------- Metode statice / friend ----------
  - tip: grila
    dificultate: licenta
    enunt: "O variabilă membră statică a unei clase:"
    variante:
      - "Există câte o copie separată pentru fiecare obiect"
      - "Nu poate fi accesată niciodată din exterior"
      - "Se inițializează automat în interiorul fiecărui constructor"
      - "Aparține clasei, nu unui obiect anume, și există chiar fără obiecte
        instanțiate"
    corect: 3
    explicatie: "O variabilă membră statică aparține clasei (nu unui obiect), există
      alocată chiar dacă nu există obiecte și trebuie definită în afara clasei."

  - tip: grila
    dificultate: licenta
    enunt: "O metodă statică (static) a unei clase:"
    variante:
      - "Nu poate fi declarată public"
      - "Primește implicit pointerul this"
      - "Poate accesa direct datele membre nestatice ale obiectelor"
      - "Nu poate accesa datele nestatice ale unui obiect și se apelează prin
        numele clasei"
    corect: 3
    explicatie: "Metoda statică aparține clasei, nu primește pointerul this și nu
      poate accesa date nestatice; se apelează cu Nume_Clasa::metoda()."

  - tip: grila
    dificultate: licenta
    enunt: "Despre relația friend în C++, care afirmație este corectă?"
    variante:
      - "Nu este comutativă și încalcă principiul încapsulării"
      - "Se moștenește automat în clasele derivate"
      - "Permite accesul doar la membrii publici"
      - "Este comutativă: dacă A e friend cu B, atunci și B e friend cu A"
    corect: 0
    explicatie: "Relația friend nu este comutativă, oferă acces la membrii
      privați/protected și este considerată o încălcare a principiului
      încapsulării."

  - tip: grila
    dificultate: licenta
    enunt: "Un specificator protected într-o clasă de bază înseamnă că membrul
      respectiv este:"
    variante:
      - "Accesibil doar prin funcții friend"
      - "Accesibil de oriunde, ca public"
      - "Inaccesibil chiar și în propria clasă"
      - "Inaccesibil din exterior, dar accesibil în clasele derivate"
    corect: 3
    explicatie: "protected se comportă ca private față de exterior, însă permite
      accesul din clasele derivate (copil)."

  # ---------- Moștenire ----------
  - tip: grila
    dificultate: licenta
    enunt: "Ce NU se moștenește dintr-o clasă de bază într-o clasă derivată?"
    variante:
      - "Datele membre"
      - "Membrii protected"
      - "Metodele de tip constructor (și destructorul)"
      - "Metodele obișnuite"
    corect: 2
    explicatie: "Clasa derivată moștenește datele și metodele clasei de bază, mai
      puțin constructorii și destructorul (deși aceștia participă la
      inițializare/distrugere)."

  - tip: grila
    dificultate: licenta
    enunt: "La derivarea private (class D : private B), un membru public din clasa
      de bază B devine în clasa derivată D:"
    variante:
      - "private"
      - "inaccesibil"
      - "protected"
      - "public"
    corect: 0
    explicatie: "La derivare private, membrii public și protected ai bazei devin
      private în derivată, iar membrii private ai bazei devin inaccesibili."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența corectă între relațiile is-a și has-a?"
    variante:
      - "is-a se implementează prin compoziție, has-a prin moștenire"
      - "Ambele se implementează doar prin moștenire multiplă"
      - "Ambele se implementează doar prin funcții friend"
      - "is-a se implementează prin moștenire, has-a prin date membre
        (compoziție)"
    corect: 3
    explicatie: "Relația is-a (este-un) se modelează prin moștenire, iar relația
      has-a (are-un) prin date membre incluse în clasă (compoziție/agregare)."

  - tip: grila
    dificultate: licenta
    enunt: "În C++, moștenirea multiplă (o clasă derivată din mai multe clase de
      bază) este:"
    variante:
      - "Interzisă, ca în Java"
      - "Permisă; ambiguitățile se rezolvă cu operatorul de scop sau moștenire
        virtuală"
      - "Permisă doar dacă bazele nu au date membre"
      - "Permisă doar pentru clase abstracte"
    corect: 1
    explicatie: "C++ permite moștenirea multiplă; ambiguitatea (ex. același membru
      moștenit de două ori) se rezolvă cu operatorul de scop :: sau prin
      moștenire virtuală."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Pentru lanțul de derivări class A : public B, class C : public A, class
      D : public C, la crearea unui obiect D se apelează automat constructorii
      claselor B, A, C, D. Câți constructori se apelează în total?"
    corect: 4
    explicatie: "Se apelează constructorii în ordinea B(), A(), C(), D() — adică 4
      constructori, de la baza cea mai îndepărtată spre clasa derivată finală."

  - tip: grila
    dificultate: licenta
    enunt: "La distrugerea unui obiect dintr-o clasă derivată D (class D : public
      B), ordinea de apel a destructorilor este:"
    variante:
      - "~D() apoi ~B()"
      - "~B() apoi ~D()"
      - "Doar ~D()"
      - "Doar ~B()"
    corect: 0
    explicatie: "Destructorii se apelează în ordine inversă constructorilor: mai
      întâi ~D() (derivata), apoi ~B() (baza)."

  # ---------- Metode virtuale / polimorfism / clase abstracte ----------
  - tip: grila
    dificultate: licenta
    enunt: "Diferența dintre overloading (supraîncărcare) și overriding
      (suprascriere) este:"
    variante:
      - "Overriding funcționează doar cu metode statice"
      - "Overloading = redefinirea unei metode moștenite; overriding = funcții
        cu nume diferite"
      - "Overloading = aceeași clasă, funcții cu liste de parametri diferite;
        overriding = redefinirea unei metode moștenite în clasa derivată"
      - "Sunt termeni identici"
    corect: 2
    explicatie: "Overloading înseamnă mai multe funcții cu același nume dar
      parametri diferiți; overriding înseamnă redefinirea (suprascrierea) în
      clasa derivată a unei metode moștenite."

  - tip: grila
    dificultate: licenta
    enunt: "Se apelează metoda printr-un pointer la clasa de bază către un obiect
      din clasa derivată. Dacă metoda este declarată virtual în baza, se
      execută:"
    variante:
      - "O eroare de compilare"
      - "Ambele metode, una după alta"
      - "Metoda suprascrisă din clasa derivată (legare dinamică)"
      - "Metoda din clasa de bază (legare statică)"
    corect: 2
    explicatie: "Pentru metode virtuale, legarea este dinamică (la runtime): se
      apelează metoda corespunzătoare tipului real al obiectului — cea din clasa
      derivată."

  - tip: grila
    dificultate: licenta
    enunt: "Mecanismul prin care C++ implementează apelul metodelor virtuale
      (legarea dinamică) se bazează pe:"
    variante:
      - "Variabile statice globale"
      - "Funcții friend"
      - "Tabela de funcții virtuale (v-table) și un pointer __vfptr"
      - "Macro-uri de preprocesare"
    corect: 2
    explicatie: "Fiecare clasă cu metode virtuale primește o tabelă de pointeri la
      funcții (v-table), iar obiectele conțin un pointer __vfptr către aceasta,
      folosit la legarea dinamică."

  - tip: grila
    dificultate: licenta
    enunt: "De ce este recomandat ca destructorul unei clase de bază să fie virtual?"
    variante:
      - "Pentru a accelera alocarea cu new"
      - "Pentru a permite copierea bit-cu-bit"
      - "Pentru a interzice moștenirea"
      - "Pentru ca, la delete printr-un pointer de bază către un obiect derivat,
        să se apeleze și destructorul derivatei (distrugere corectă)"
    corect: 3
    explicatie: "Fără destructor virtual, delete pe un pointer de bază către un
      obiect derivat apelează doar ~Baza(), nu și ~Derivat() — rezultă o
      distrugere incompletă."

  - tip: grila
    dificultate: licenta
    enunt: "O metodă virtuală pură este declarată astfel:"
    variante:
      - "void f() const;"
      - "friend void f();"
      - "virtual void f() = 0;"
      - "static void f();"
    corect: 2
    explicatie: "O metodă virtuală pură are forma virtual tip f() = 0; nu are
      implementare în clasa de bază și obligă clasele derivate concrete să o
      implementeze."

  - tip: grila
    dificultate: licenta
    enunt: "Care afirmație despre o clasă abstractă este corectă?"
    variante:
      - "Toate metodele ei trebuie să fie statice"
      - "Nu poate avea date membre"
      - "Poate fi instanțiată direct"
      - "Are cel puțin o metodă virtuală pură și NU poate fi instanțiată"
    corect: 3
    explicatie: "O clasă abstractă conține cel puțin o metodă virtuală pură și nu
      poate fi instanțiată; se lucrează cu ea prin pointeri/referințe către
      obiecte ale claselor concrete derivate."

  # ---------- Supraîncărcarea operatorilor ----------
  - tip: grila
    dificultate: licenta
    enunt: "Care dintre acești operatori NU poate fi supraîncărcat în C++?"
    variante:
      - "Operatorul <<"
      - "Operatorul []"
      - "Operatorul +"
      - "Operatorul de scop ::"
    corect: 3
    explicatie: "Operatorul de scop :: și operatorul de selecție de membru . nu pot
      fi supraîncărcați; majoritatea celorlalți operatori standard pot fi
      supraîncărcați."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru a permite expresia 2 + a (un întreg la stânga, un obiect la
      dreapta) prin supraîncărcarea operatorului +, soluția corectă este:"
    variante:
      - "O funcție friend operator+(int, const Complex&)"
      - "O metodă membră operator+(int)"
      - "Nu se poate realiza în niciun fel"
      - "Supraîncărcarea operatorului ::"
    corect: 0
    explicatie: "Când operandul stâng nu este un obiect al clasei, supraîncărcarea
      nu se poate face ca metodă membră; soluția este o funcție standalone
      declarată friend."

  # ---------- Template-uri ----------
  - tip: grila
    dificultate: licenta
    enunt: "Sintaxa template <class T> poate fi înlocuită echivalent cu:"
    variante:
      - "template <typename T>"
      - "generic <T>"
      - "template <static T>"
      - "template <virtual T>"
    corect: 0
    explicatie: "În declararea unui template, cuvintele cheie class și typename sunt
      echivalente: template <class T> ≡ template <typename T>."

  - tip: grila
    dificultate: licenta
    enunt: "Când are loc generarea (instanțierea) efectivă a codului pentru o clasă
      template, ex. Vector<int>?"
    variante:
      - "Doar la runtime, prin reflexie"
      - "Întotdeauna, chiar dacă tipul nu este folosit"
      - "Niciodată, template-urile rămân abstracte"
      - "Numai când se instanțiază template-ul pentru acel tip concret (ex.
        Vector<int>)"
    corect: 3
    explicatie: "Codul concret al unei clase/funcții template se generează doar
      atunci când template-ul este instanțiat pentru un tip de date concret."

  # ---------- STL ----------
  - tip: grila
    dificultate: licenta
    enunt: "Ce este, în esență, un iterator în STL?"
    variante:
      - "Un pointer care permite parcurgerea elementelor unui container"
      - "Un tip de excepție"
      - "O variabilă statică globală"
      - "O metodă virtuală pură"
    corect: 0
    explicatie: "Un iterator este practic un pointer care permite parcurgerea
      elementelor unui container; accesul la element se face cu *it, iar avansul
      cu it++."

  - tip: grila
    dificultate: licenta
    enunt: "Containerul std::map din STL modelează:"
    variante:
      - "Un dicționar cheie-valoare, implementat de regulă pe arbori"
      - "O stivă LIFO"
      - "Un tablou cu dimensiune fixă"
      - "O coadă FIFO"
    corect: 0
    explicatie: "std::map este echivalentul unui dicționar (key-value), cu
      implementare bazată de regulă pe arbori echilibrați."

  # ---------- Excepții ----------
  - tip: grila
    dificultate: licenta
    enunt: "În mecanismul de excepții C++, instrucțiunea throw:"
    variante:
      - "Definește blocul protejat de cod"
      - "Lansează (aruncă) o excepție furnizând valoarea acesteia"
      - "Captează excepția și o tratează"
      - "Eliberează memoria din heap"
    corect: 1
    explicatie: "throw lansează o excepție; blocul try delimitează codul protejat,
      iar catch captează și tratează excepția în funcție de tipul ei."

  - tip: grila
    dificultate: licenta
    enunt: "Ce se întâmplă dacă o excepție lansată nu are niciun bloc catch
      compatibil ca tip pe stiva de apeluri?"
    variante:
      - "Excepția rămâne netratată și programul se încheie abrupt"
      - "Se transformă automat în std::exception"
      - "Excepția este ignorată și programul continuă normal"
      - "Se apelează automat constructorul de copiere"
    corect: 0
    explicatie: "Dacă nu există un catch potrivit ca tip, excepția rămâne netratată
      (unhandled) și programul se încheie abrupt."

  - tip: grila
    dificultate: licenta
    enunt: "Un bloc catch(...) (cu trei puncte) într-un try:"
    variante:
      - "Nu este permis în C++"
      - "Captează doar excepțiile de tip int"
      - "Relansează automat excepția"
      - "Este un handler general care captează orice tip de excepție generată în
        try"
    corect: 3
    explicatie: "catch(...) este un handler implicit/general care captează orice tip
      de excepție pentru care nu există un catch specific."

  # ---------- C++11 ----------
  - tip: grila
    dificultate: licenta
    enunt: "În C++11, cuvântul cheie auto folosit la o declarație cu inițializare:"
    variante:
      - "Declară o variabilă statică"
      - "Are același sens ca în C (variabilă automată pe stivă)"
      - "Forțează alocarea în heap"
      - "Determină compilatorul să deducă tipul din expresia de inițializare"
    corect: 3
    explicatie: "În C++11, auto permite deducerea automată a tipului din expresia de
      inițializare (la compile-time), sens total diferit de cel din C."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "În ce an a apărut standardul C++11 (anul din numele standardului)?"
    corect: 2011
    explicatie: "Standardul C++11 a apărut în septembrie 2011, fiind o variantă
      major îmbunătățită față de C++03."

  - tip: grila
    dificultate: licenta
    enunt: "O expresie rvalue în C++ (relevantă pentru referințele rvalue și move
      semantics):"
    variante:
      - "Este același lucru cu o referință lvalue"
      - "Poate apărea doar în stânga operatorului ="
      - "Nu are adresă de memorie; de regulă valori literale sau obiecte
        temporare"
      - "Are întotdeauna o adresă de memorie ce poate fi luată cu &"
    corect: 2
    explicatie: "O expresie rvalue (ex. literal sau obiect temporar) nu are adresă
      de memorie, apare doar în dreapta atribuirii și stă la baza referințelor
      rvalue (T&&) și a move semantics."

  - tip: grila
    dificultate: licenta
    enunt: "Care este scopul principal al mecanismului move semantics și al
      constructorului de tip move din C++11?"
    variante:
      - "Să forțeze legarea statică"
      - "Să optimizeze performanța transferând ownership-ul resurselor în loc de
        deep-copy"
      - "Să interzică copierea obiectelor"
      - "Să elimine necesitatea destructorilor"
    corect: 1
    explicatie: "Move semantics îmbunătățește performanța prin transferul (mutarea)
      ownership-ului resurselor între obiecte, evitând copierea profundă
      costisitoare (deep-copy)."

  # ============================================================
  #  ÎNTREBĂRI NOI — ACCENT PE COD
  # ============================================================

  # ---------- adevarat_fals (departajare) ----------
  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Un constructor are același nume ca al clasei și nu returnează niciun tip,
      nici măcar void."
    corect: 0
    explicatie: "Adevărat: constructorii poartă numele clasei și nu au tip de retur,
      nici void."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "O funcție virtuală pură (= 0) face clasa abstractă, astfel încât nu se
      mai pot instanția obiecte directe ale acelei clase."
    corect: 0
    explicatie: "Adevărat: o clasă cu cel puțin o metodă virtuală pură este abstractă
      și nu poate fi instanțiată direct."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "În C++ destructorii pot fi supraîncărcați, o clasă putând avea mai mulți
      destructori cu parametri diferiți."
    corect: 1
    explicatie: "Fals: o clasă are un singur destructor, fără parametri și fără
      supraîncărcare."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Apelul unei metode virtuale printr-un pointer la clasa de bază este
      rezolvat la compilare (legare statică), pe baza tipului pointerului."
    corect: 1
    explicatie: "Fals: metodele virtuale folosesc legarea dinamică (la execuție), prin
      vtable, pe baza tipului real al obiectului, nu al pointerului."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "La instanțierea unui template de clasă, compilatorul generează cod
      specializat pentru fiecare tip concret cu care este folosit."
    corect: 0
    explicatie: "Adevărat: template-urile sunt instanțiate de compilator, generând o
      versiune de cod pentru fiecare tip efectiv utilizat."

  # ---------- grila cu COD (timp 50) ----------
  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul (legare dinamică)?"
    cod: |
      struct A { virtual void f(){ cout << "A"; } };
      struct B : A { void f() override { cout << "B"; } };
      A* p = new B();
      p->f();
    timp: 50
    variante: [ "Eroare de compilare", "A", "B", "AB" ]
    corect: 2
    explicatie: "f() este virtuală => legare dinamică => tipul real al obiectului
      este B => se apelează B::f() => 'B'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul (metodă NEvirtuală apelată prin pointer la bază)?"
    cod: |
      struct A { void f(){ cout << "A"; } };
      struct B : A { void f(){ cout << "B"; } };
      A* p = new B();
      p->f();
    timp: 50
    variante: [ "Eroare de compilare", "BA", "A", "B" ]
    corect: 2
    explicatie: "f() NU este virtuală => legare statică, după tipul pointerului (A*)
      => se apelează A::f() => 'A'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul de mai jos? Atenție la ce tip de metode sunt F1 și F2."
    cod: |
      class Baza {
      public:
          void F1(){ cout << "1"; }
          virtual void F2(){ cout << "2"; }
      };
      class Derivat : public Baza {
      public:
          void F1(){ cout << "3"; }
          void F2(){ cout << "4"; }
      };
      Baza* p = new Derivat();
      p->F1();
      p->F2();
    timp: 50
    variante: [ "34", "14", "32", "12" ]
    corect: 1
    explicatie: "F1 nu e virtuală => legare statică pe Baza => '1'. F2 e virtuală =>
      legare dinamică pe Derivat => '4'. Rezultat: '14'."

  - tip: grila
    dificultate: licenta
    enunt: "Care este ordinea de afișare (apelul constructorilor)?"
    cod: |
      struct Baza {
          Baza(){ cout << "B"; }
      };
      struct Derivat : public Baza {
          Derivat(){ cout << "D"; }
      };
      int main(){ Derivat d; }
    timp: 50
    variante: [ "DB", "B", "BD", "D" ]
    corect: 2
    explicatie: "La construirea unui obiect derivat se apelează întâi constructorul
      bazei, apoi al derivatei: 'B' apoi 'D' => 'BD'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (constructori și destructori)?"
    cod: |
      struct Baza {
          Baza(){ cout << "cB"; }
          ~Baza(){ cout << "dB"; }
      };
      struct Derivat : public Baza {
          Derivat(){ cout << "cD"; }
          ~Derivat(){ cout << "dD"; }
      };
      int main(){ Derivat d; }
    timp: 50
    variante: [ "cDcBdDdB", "cBcDdBdD", "cBcDdDdB", "cDcBdBdD" ]
    corect: 2
    explicatie: "Construcție bază->derivat: cB, cD. Distrugere în ordine inversă:
      dD, dB. Rezultat: 'cBcDdDdB'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează (membru obiect vs constructorul clasei care îl conține)?"
    cod: |
      struct Point {
          Point(){ cout << "P"; }
      };
      struct Vector {
          Point a, b;
          Vector(){ cout << "V"; }
      };
      int main(){ Vector v; }
    timp: 50
    variante: [ "VPP", "VP", "PPV", "PV" ]
    corect: 2
    explicatie: "Membrii obiect se construiesc înaintea corpului constructorului
      clasei: a (P), b (P), apoi corpul Vector (V) => 'PPV'."

  - tip: grila
    dificultate: licenta
    enunt: "Câte apeluri ale constructorului Point afișează acest cod și care e
      rezultatul?"
    cod: |
      struct Point {
          Point(){ cout << "P"; }
      };
      int main(){
          Point arr[3];
      }
    timp: 50
    variante: [ "PPP", "Nimic", "PP", "P" ]
    corect: 0
    explicatie: "Pentru un tablou de 3 obiecte Point se apelează constructorul de 3
      ori, deci se afișează 'PPP'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul? (copy constructor vs operator de asignare)"
    cod: |
      struct C {
          C(){ cout << "ctor "; }
          C(const C&){ cout << "copy "; }
          C& operator=(const C&){ cout << "asig "; return *this; }
      };
      int main(){
          C a;
          C b = a;
      }
    timp: 50
    variante:
      - "ctor copy asig "
      - "ctor copy "
      - "ctor ctor "
      - "ctor asig "
    corect: 1
    explicatie: "C b = a; este inițializare la declarare => se apelează
      constructorul de copiere, NU operatorul =. Deci 'ctor copy '."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul? (atenție: asignare către obiect deja construit)"
    cod: |
      struct C {
          C(){ cout << "ctor "; }
          C(const C&){ cout << "copy "; }
          C& operator=(const C&){ cout << "asig "; return *this; }
      };
      int main(){
          C a;
          C b;
          b = a;
      }
    timp: 50
    variante:
      - "ctor copy asig "
      - "ctor ctor copy "
      - "ctor ctor "
      - "ctor ctor asig "
    corect: 3
    explicatie: "a și b se construiesc (ctor ctor). b = a; este asignare către un
      obiect existent => se apelează operatorul = => 'asig'. Rezultat: 'ctor
      ctor asig '."

  - tip: grila
    dificultate: licenta
    enunt: "Compilează acest cod? (instanțierea unei clase abstracte)"
    cod: |
      struct Forma {
          virtual double arie() = 0;
      };
      int main(){
          Forma f;
          return 0;
      }
    timp: 50
    variante:
      - "Da, fără probleme"
      - "Nu — nu se poate instanția o clasă abstractă"
      - "Da, dar arie() returnează 0"
      - "Da, dar doar dacă Forma e declarată class"
    corect: 1
    explicatie: "Forma are o metodă virtuală pură (= 0) => este clasă abstractă și
      NU poate fi instanțiată direct (Forma f; dă eroare de compilare)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul? (destructor virtual, delete prin pointer la bază)"
    cod: |
      struct Baza {
          virtual ~Baza(){ cout << "dB"; }
      };
      struct Derivat : public Baza {
          ~Derivat(){ cout << "dD"; }
      };
      int main(){
          Baza* p = new Derivat();
          delete p;
      }
    timp: 50
    variante: [ "Nimic", "dD dB", "dB dD", "dB" ]
    corect: 1
    explicatie: "Destructorul bazei este virtual => la delete p se apelează întâi
      ~Derivat() apoi ~Baza() (ordine inversă) => 'dDdB', adică 'dD dB'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul? (destructor NEvirtual, delete prin pointer la bază)"
    cod: |
      struct Baza {
          ~Baza(){ cout << "dB"; }
      };
      struct Derivat : public Baza {
          ~Derivat(){ cout << "dD"; }
      };
      int main(){
          Baza* p = new Derivat();
          delete p;
      }
    timp: 50
    variante:
      - "dD dB"
      - "Doar dB (distrugere incompletă)"
      - "dB dD"
      - "Nimic"
    corect: 1
    explicatie: "Destructorul bazei NU e virtual => delete p apelează doar ~Baza()
      => 'dB'. ~Derivat() nu se apelează — distrugere incompletă a obiectului."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează codul (supraîncărcarea operatorului +)?"
    cod: |
      struct Nr {
          int v;
          Nr(int x):v(x){}
          Nr operator+(const Nr& o){ return Nr(v + o.v); }
      };
      int main(){
          Nr a(2), b(3);
          Nr c = a + b;
          cout << c.v;
      }
    timp: 50
    variante: [ "Eroare de compilare", "23", "6", "5" ]
    corect: 3
    explicatie: "operator+ adună câmpurile v: 2 + 3 = 5. c.v afișează 5."

  - tip: grila
    dificultate: licenta
    enunt: "Compilează expresia 2 + a din main, dat fiind codul de mai jos?"
    cod: |
      struct Nr {
          int v;
          Nr(int x):v(x){}
          Nr operator+(int k){ return Nr(v + k); }
      };
      int main(){
          Nr a(5);
          Nr c = 2 + a;
          cout << c.v;
      }
    timp: 50
    variante:
      - "Da, afișează 5"
      - "Nu — operandul stâng e int, ar fi nevoie de operator+ friend"
      - "Da, afișează 2"
      - "Da, afișează 7"
    corect: 1
    explicatie: "operator+ e metodă membră => operandul stâng trebuie să fie un
      obiect Nr. La 2 + a operandul stâng e int => nu se poate, ar fi nevoie de
      o funcție friend operator+(int, const Nr&). Eroare de compilare."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează acest cod? (apel metodă moștenită, nesuprascrisă)"
    cod: |
      struct Baza {
          void salut(){ cout << "Baza"; }
      };
      struct Derivat : public Baza {
      };
      int main(){
          Derivat d;
          d.salut();
      }
    timp: 50
    variante: [ "Derivat", "Baza", "Eroare de compilare", "Nimic" ]
    corect: 1
    explicatie: "Derivat moștenește metoda salut() din Baza și nu o suprascrie =>
      d.salut() apelează Baza::salut() => 'Baza'."

  # ---------- grila normale (fără cod) ----------
  - tip: grila
    dificultate: licenta
    enunt: "Pentru o instrucțiune de forma Complex d = a; (unde a este un obiect
      Complex deja existent), ce se apelează de fapt?"
    variante:
      - "Destructorul lui a"
      - "Operatorul de asignare operator="
      - "Constructorul de copiere (este inițializare, nu asignare)"
      - "Constructorul fără parametri"
    corect: 2
    explicatie: "Deși apare semnul =, este o INIȚIALIZARE la declarare => se
      apelează constructorul de copiere, nu operatorul de asignare."

  - tip: grila
    dificultate: licenta
    enunt: "Mecanismul prin care, la un apel printr-un pointer la clasa de bază, se
      alege metoda virtuală corectă a tipului real al obiectului se numește:"
    variante:
      - "Supraîncărcare (overloading)"
      - "Legare dinamică (runtime), prin v-table"
      - "Compoziție"
      - "Legare statică (compile-time)"
    corect: 1
    explicatie: "Pentru metode virtuale, alegerea se face la runtime în funcție de
      tipul real al obiectului (legare dinamică / dynamic binding), folosind
      tabela v-table și pointerul __vfptr."

  - tip: grila
    dificultate: licenta
    enunt: "Dacă o clasă derivată dintr-o clasă abstractă NU implementează toate
      metodele virtuale pure moștenite, atunci clasa derivată:"
    variante:
      - "Rămâne abstractă și nu poate fi instanțiată"
      - "Devine concretă și poate fi instanțiată"
      - "Generează eroare de compilare la declarare"
      - "Pierde automat moștenirea"
    corect: 0
    explicatie: "Dacă nu implementează toate metodele virtuale pure moștenite, clasa
      derivată rămâne abstractă și nu poate fi instanțiată direct."
