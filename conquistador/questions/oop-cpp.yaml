      rvalue (&&), move semantics și nullptr (anul din numele standardului)?"
    corect: 2011
    explicatie: "C++11 (anul 2011) a introdus auto, referințele rvalue T&&, move
      semantics, nullptr și multe alte facilități."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câți constructori de copiere distincți poate avea, cel mult, o clasă în
      C++ (după regula din curs)?"
    corect: 1
    explicatie: "La nivelul unei clase poate exista un singur constructor de
