# ============================================================
#  Banca de întrebări — PROGRAMARE ÎN C
#  Nivel: examen de licență. Trei tipuri:
#    - grila          : 4 variante, "corect" = indexul (de la 0)
#    - numeric_exact  : răspuns STRICT
#    - numeric_aprox  : estimare, câștigă cine se apropie cel mai mult
#  Câmpul "explicatie" se arată DUPĂ răspuns (rol educativ).
# ============================================================
topic: programare-c
nume: "Programare în C"
intrebari:
  - tip: numeric_exact
    dificultate: licenta
    enunt: "Pe un sistem pe 64 de biți, câți octeți ocupă o variabilă de tip 'int'
      (rezultatul lui sizeof(int))?"
    corect: 4
    explicatie: "Conform standardului uzual, sizeof(int) este 4 octeți atât pe
      sisteme pe 32, cât și pe 64 de biți."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Pe un sistem pe 64 de biți, câți octeți ocupă un pointer (de ex.
      sizeof(int*))?"
    corect: 8
    explicatie: "Pe sisteme pe 64 de biți un pointer reține o adresă pe 64 de biți,
      adică 8 octeți."

  - tip: grila
    dificultate: licenta
    enunt: "Care este valoarea expresiei '1 / 2' în C, dacă ambii operanzi sunt de
      tip int?"
    variante: [ "0.5", "0", "1", "2" ]
    corect: 1
    explicatie: "Împărțirea întreagă elimină restul: 1/2 dă 0 (rezultat de tip int)."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Care este rezultatul expresiei întregi '7 % 4' în C?"
    corect: 3
    explicatie: "Operatorul % dă restul împărțirii întregi: 7 împărțit la 4 dă cât 1
      și rest 3."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Pentru 'unsigned int a = 60;', cât este valoarea expresiei 'a >> 2'
      (deplasare dreapta cu 2 biți)?"
    corect: 15
    explicatie: "Deplasarea la dreapta cu 2 împarte la 4: 60 / 4 = 15 (0011 1100
      devine 0000 1111)."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru 'unsigned int a = 60;', cât este valoarea expresiei 'a << 2'
      (deplasare stânga cu 2 biți)?"
    variante: [ "240", "120", "30", "62" ]
    corect: 0
    explicatie: "Deplasarea la stânga cu 2 înmulțește cu 4: 60 * 4 = 240."

  - tip: grila
    dificultate: licenta
    enunt: "Operatorul ternar din C, '?:', pentru expresia 'x = (a > b) ? a : b;'
      calculează:"
    variante:
      [
        "suma a + b",
        "minimul dintre a și b",
        "restul a % b",
        "maximul dintre a și b"
      ]
    corect: 3
    explicatie: "Operatorul ternar returnează a dacă condiția (a > b) este
      adevărată, altfel b, adică maximul."

  - tip: grila
    dificultate: licenta
    enunt: "Operatorul '++' postfixat, ca în 'c = a++;', face ca:"
    variante:
      [
        "c să primească a deja incrementat",
        "c să devină adresa lui a",
        "a să rămână neschimbat",
        "c să primească valoarea veche a lui a, iar apoi a să fie incrementat"
      ]
    corect: 3
    explicatie: "La postincrementare (a++), valoarea curentă este folosită întâi în
      expresie, iar incrementarea are loc după."

  - tip: grila
    dificultate: licenta
    enunt: "În C, ce valoare se consideră 'fals' într-o condiție?"
    variante:
      [
        "Doar valoarea 0",
        "Orice valoare diferită de 0",
        "Doar valoarea -1",
        "Doar valoarea 1"
      ]
    corect: 0
    explicatie: "C consideră orice valoare diferită de 0 ca adevărat, iar valoarea 0
      (sau null) ca fals."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența esențială dintre bucla 'while' și bucla 'do-while'
      în C?"
    variante:
      [
        "while nu testează nicio condiție",
        "while nu poate fi infinită",
        "do-while execută corpul cel puțin o dată, deoarece testează condiția
          la final",
        "do-while nu acceptă instrucțiunea break"
      ]
    corect: 2
    explicatie: "La do-while condiția se evaluează după corpul buclei, deci acesta
      se execută cel puțin o dată."

  - tip: grila
    dificultate: licenta
    enunt: "Într-o instrucțiune 'switch' din C, ce se întâmplă dacă lipsește 'break'
      la finalul unui caz (case)?"
    variante:
      [
        "Se sare automat la default",
        "Programul dă eroare de compilare",
        "Execuția continuă (cade) în următorul case",
        "Se iese imediat din switch"
      ]
    corect: 2
    explicatie: "Fără break, execuția continuă în cazurile următoare (fenomenul de
      fall-through)."

  - tip: grila
    dificultate: licenta
    enunt: "În C, transmiterea unui argument prin valoare (call by value) către o
      funcție înseamnă că:"
    variante:
      [
        "funcția nu poate folosi argumentul",
        "funcția modifică direct variabila apelantului",
        "argumentul devine pointer automat",
        "funcția primește o copie a argumentului; modificările locale nu
          afectează variabila originală"
      ]
    corect: 3
    explicatie: "La call by value se copiază valoarea în parametrul formal, deci
      variabila din apelant rămâne neschimbată."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru ca o funcție din C să modifice o variabilă a apelantului,
      parametrul trebuie transmis:"
    variante:
      [
        "prin adresă (pointer), iar funcția dereferențiază cu *",
        "prin valoare",
        "obligatoriu ca variabilă globală",
        "ca o constantă const"
      ]
    corect: 0
    explicatie: "Transmiterea adresei (call by reference) permite ca funcția să
      modifice valoarea originală prin dereferențiere cu *."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru funcția recursivă 'int fact(int n){ if(n==0) return 1; else
      return fact(n-1)*n; }', cât este fact(0)?"
    variante: [ "Recursie infinită", "1", "0", "Eroare de compilare" ]
    corect: 1
    explicatie: "Cazul de bază n==0 returnează 1, deci fact(0) este 1 (0! = 1)."

  - tip: grila
    dificultate: licenta
    enunt: "În C, ce relație există între numele unui tablou (array) și un pointer?"
    variante:
      [
        "tabloul nu poate fi accesat prin indexare",
        "numele tabloului se comportă ca adresa primului element",
        "numele tabloului este o copie a întregului tablou",
        "tabloul și pointerul sunt tipuri complet incompatibile"
      ]
    corect: 1
    explicatie: "Numele unui tablou se evaluează la adresa primului element, de
      aceea poate fi folosit ca pointer."

  - tip: grila
    dificultate: licenta
    enunt: "În C, un tablou 'int a[10];' are indici valizi:"
    variante:
      [
        "de la -1 la 9",
        "de la 1 la 10",
        "de la 0 la 10",
        "de la 0 la 9, deci a[10] nu există"
      ]
    corect: 3
    explicatie: "Tablourile în C sunt indexate de la 0; cele 10 elemente sunt
      a[0]..a[9], iar a[10] este în afara limitelor."

  - tip: grila
    dificultate: licenta
    enunt: "Care este o greșeală clasică de tip 'off-by-one' la parcurgerea unui
      tablou 'int a[10];'?"
    variante:
      [
        "folosirea condiției 'i < 10'",
        "folosirea condiției 'i <= 10', care accesează a[10], inexistent",
        "inițializarea cu 'int i = 0'",
        "incrementarea cu 'i++'"
      ]
    corect: 1
    explicatie: "Condiția 'i <= 10' ajunge la indicele 10, în afara tabloului;
      corect este 'i < 10'."

  - tip: grila
    dificultate: licenta
    enunt: "Cum este reprezentat în memorie un șir de caractere (C-string) precum
      \"Hello\"?"
    variante:
      [
        "ca un singur întreg",
        "ca o secvență terminată cu spațiu",
        "ca un tablou fără terminator",
        "ca o secvență de caractere terminată cu caracterul null '\\0'"
      ]
    corect: 3
    explicatie: "Un C-string este o secvență de caractere terminată cu '\\0'
      (caracterul null, cu cod 0)."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Câte poziții (octeți) ocupă în memorie șirul inițializat 'char s[] =
      \"Hello\";', incluzând terminatorul?"
    corect: 6
    explicatie: "Cele 5 litere plus terminatorul '\\0' dau 6 octeți:
      'H','e','l','l','o','\\0'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce returnează 'strcmp(s1, s2)' dacă cele două șiruri sunt identice?"
    variante: [ "-1", "0", "lungimea șirurilor", "1" ]
    corect: 1
    explicatie: "strcmp returnează 0 când șirurile sunt egale, valoare negativă dacă
      s1<s2 și pozitivă dacă s1>s2."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru 'int x = 2; int *j = &x;', ce valoare are expresia '*j'?"
    variante: [ "adresa lui x", "adresa lui j", "2 (valoarea lui x)", "0" ]
    corect: 2
    explicatie: "Operatorul de dereferențiere * accesează valoarea de la adresa
      stocată în j, adică valoarea lui x (2)."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Un pointer 'int *p;' indică adresa 1000. După 'p = p + 5;', ce adresă
      (valoare numerică) are p, presupunând sizeof(int)=4?"
    corect: 1020
    explicatie: "Aritmetica pe pointeri avansează cu sizeof(tip): 5 întregi * 4
      octeți = 20, deci 1000 + 20 = 1020."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este constanta NULL folosită la pointeri în C?"
    variante:
      [
        "adresa primei variabile globale",
        "o valoare simbolică (de regulă 0) care indică un pointer ce nu
          pointează spre nimic valid",
        "un șir vid de caractere",
        "întotdeauna adresa 0xFFFF"
      ]
    corect: 1
    explicatie: "NULL (definit uzual ca 0) marchează un pointer care nu indică o
      locație de memorie validă."

  - tip: grila
    dificultate: licenta
    enunt: "Ce returnează funcția 'malloc(size)' din <stdlib.h>?"
    variante:
      [
        "un pointer (void*) către blocul alocat, sau NULL dacă alocarea
          eșuează",
        "numărul de octeți alocați",
        "un întreg cu codul de eroare",
        "întotdeauna NULL"
      ]
    corect: 0
    explicatie: "malloc returnează un pointer către blocul cerut din heap sau NULL
      dacă cererea nu poate fi satisfăcută."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Câți octeți alocă apelul 'malloc(10 * sizeof(int))' pe un sistem cu
      sizeof(int)=4?"
    corect: 40
    explicatie: "10 întregi * 4 octeți fiecare = 40 de octeți, suficienți pentru
      exact 10 valori int."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este un 'memory leak' (scurgere de memorie) în C?"
    variante:
      [
        "memorie alocată cu malloc care nu este eliberată cu free și devine
          inaccesibilă",
        "folosirea unui pointer NULL",
        "depășirea stivei la recursie",
        "citirea în afara limitelor unui tablou"
      ]
    corect: 0
    explicatie: "Un memory leak apare când memoria din heap nu este eliberată cu
      free și nu mai poate fi recuperată."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este un 'dangling pointer' (pointer suspendat)?"
    variante:
      [
        "un pointer care încă reține adresa unui bloc deja eliberat cu free",
        "un pointer inițializat cu NULL",
        "un pointer către o variabilă globală",
        "un pointer la o funcție"
      ]
    corect: 0
    explicatie: "După free, pointerul continuă să indice blocul eliberat; folosirea
      lui (dangling pointer) duce la comportament nedefinit."

  - tip: grila
    dificultate: licenta
    enunt: "Cum se accesează membrul unei structuri printr-un pointer la structură,
      de ex. 'struct Books *p;'?"
    variante: [ "*p.title", "&p.title", "p.title", "p->title" ]
    corect: 3
    explicatie: "Prin pointer se folosește operatorul ->, deci p->title este
      echivalent cu (*p).title."

  - tip: grila
    dificultate: licenta
    enunt: "Care este principala diferență dintre 'struct' și 'union' în C?"
    variante:
      [
        "union ocupă mai multă memorie decât struct",
        "struct nu poate conține tablouri",
        "la struct membrii au locații separate; la union toți membrii
          partajează aceeași zonă de memorie",
        "union poate avea doar un singur membru"
      ]
    corect: 2
    explicatie: "Într-o uniune toți membrii ocupă aceeași zonă de memorie
      (suprapuși), pe când într-o structură fiecare are spațiul propriu."

  - tip: grila
    dificultate: licenta
    enunt: "În ce mod se deschide un fișier cu fopen pentru a SCRIE (creând fișierul
      sau golindu-l)?"
    variante: [ "modul \"x\"", "modul \"a\"", "modul \"r\"", "modul \"w\"" ]
    corect: 3
    explicatie: "Modul \"w\" deschide/creează un fișier text pentru scriere; \"r\" e
      citire, \"a\" e adăugare (append)."

  - tip: grila
    dificultate: licenta
    enunt: "Care pereche de funcții se folosește în mod tipic pentru citire/scriere
      în fișiere BINARE în C?"
    variante: [ "fread / fwrite", "fgetc / fputc", "fscanf / fprintf", "fgets / fputs" ]
    corect: 0
    explicatie: "Pentru fișiere binare se folosesc fread și fwrite, care transferă
      blocuri de octeți; fprintf/fscanf sunt pentru text."

  - tip: grila
    dificultate: licenta
    enunt: "În exemplul 'unsigned int stop_val = 0; int i = -10; while(i <=
      stop_val) ...', de ce bucla nu se execută corect?"
    variante:
      [
        "i este convertit la unsigned, iar -10 devine un număr foarte mare,
          deci condiția e falsă",
        "while nu acceptă variabile unsigned",
        "stop_val nu poate fi 0",
        "i nu poate fi negativ"
      ]
    corect: 0
    explicatie: "La compararea int cu unsigned, i (-10) este convertit la unsigned
      (o valoare mare), deci 'i <= 0' devine falsă și bucla nu intră."

  - tip: grila
    dificultate: licenta
    enunt: "De ce este greșit ca o funcție să returneze adresa unei variabile
      locale, ex. 'int r[10]; ... return r;'?"
    variante:
      [
        "tablourile nu pot fi locale",
        "funcțiile nu pot returna pointeri",
        "r nu poate fi inițializat",
        "variabila locală este dealocată la ieșirea din funcție, deci
          pointerul devine invalid"
      ]
    corect: 3
    explicatie: "Memoria locală (de pe stivă) este eliberată la ieșirea din funcție;
      pointerul returnat devine dangling, cu comportament nedefinit."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este un 'buffer overflow' la lucrul cu tablouri/șiruri în C?"
    variante:
      [
        "folosirea lui sizeof",
        "inițializarea cu acolade {}",
        "citirea corectă a unui tablou",
        "scrierea în afara zonei alocate, peste limitele tabloului/buffer-ului"
      ]
    corect: 3
    explicatie: "Un buffer overflow apare când se scrie dincolo de capacitatea
      alocată, coruptând memoria învecinată."

  - tip: grila
    dificultate: licenta
    enunt: "Problema 'dangling else' din C se referă la faptul că un 'else' fără
      acolade:"
    variante:
      [
        "se asociază cu primul if din program",
        "nu poate exista fără switch",
        "se asociază cu cel mai apropiat 'if' interior, nu neapărat cu cel
          sugerat de indentare",
        "generează întotdeauna eroare de compilare"
      ]
    corect: 2
    explicatie: "Un else se leagă de cel mai apropiat if anterior; pentru asocierea
      dorită se folosesc acolade explicite."

  # ==========================================================
  #  ÎNTREBĂRI NOI — accent pe COD (citire/execuție mentală)
  # ==========================================================

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul?"
    cod: |
      int a[] = {10, 20, 30, 40, 50};
      int *p = a + 2;
      printf("%d", *(p + 1));
    timp: 50
    variante: [ "50", "20", "40", "30" ]
    corect: 2
    explicatie: "p indică a[2] (valoarea 30); *(p+1) accesează a[3], adică 40."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul?"
    cod: |
      int a[] = {5, 10, 15, 20};
      int *p = a;
      printf("%d", *(p + 3) - *p);
    timp: 50
    variante: [ "5", "10", "15", "20" ]
    corect: 2
    explicatie: "*(p+3) este a[3] = 20, iar *p este a[0] = 5; diferența 20 - 5 = 15."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (împărțire și modulo pe întregi)?"
    cod: |
      int x = 5, y = 2;
      printf("%d", x / y + x % y);
    timp: 50
    variante: [ "4", "3", "2", "5" ]
    corect: 1
    explicatie: "x/y = 5/2 = 2 (împărțire întreagă), x%y = 5%2 = 1; suma este 2 + 1 = 3."

  - tip: grila
    dificultate: licenta
    enunt: "Ce valoare are b după execuție?"
    cod: |
      int a = 2;
      int b = a++ + ++a;
      printf("%d", b);
    timp: 50
    variante: [ "7", "6", "4", "5" ]
    corect: 1
    explicatie: "a++ folosește 2 (apoi a devine 3); ++a îl face 4 și folosește 4; b
      = 2 + 4 = 6."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (operatorul ȘI pe biți)?"
    cod: |
      unsigned char x = 0x37;
      unsigned char y = 0x19;
      printf("%d", x & y);
    timp: 50
    variante: [ "63", "15", "17", "55" ]
    corect: 2
    explicatie: "0x37 = 0011 0111, 0x19 = 0001 1001; ȘI pe biți dă 0001 0001 = 17."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul?"
    cod: |
      char c = 'A';
      c = c + 1;
      printf("%c", c);
    timp: 50
    variante: [ "66", "1", "B", "A" ]
    corect: 2
    explicatie: "'A' are codul 65; 65 + 1 = 66, iar cu %c se afișează caracterul cu
      codul 66, adică 'B'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (operatorul SAU-exclusiv pe biți)?"
    cod: |
      int a = 12;
      int b = 10;
      printf("%d", a ^ b);
    timp: 50
    variante: [ "22", "6", "2", "8" ]
    corect: 1
    explicatie: "12 = 1100, 10 = 1010; XOR pune 1 doar unde biții diferă: 0110 = 6."

  - tip: grila
    dificultate: licenta
    enunt: "Ce valoare afișează programul?"
    cod: |
      int i = 0, s = 0;
      while (i < 5) {
          s += i;
          i++;
      }
      printf("%d", s);
    timp: 50
    variante: [ "15", "25", "10", "5" ]
    corect: 2
    explicatie: "Bucla adună 0+1+2+3+4 (pentru i de la 0 la 4); suma este 10."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (numărul de elemente al unui tablou)?"
    cod: |
      int a[] = {1, 2, 3, 4, 5};
      printf("%d", (int)(sizeof(a) / sizeof(a[0])));
    timp: 50
    variante: [ "20", "4", "5", "1" ]
    corect: 2
    explicatie: "sizeof(a) este 20 (5*4 octeți), sizeof(a[0]) este 4; 20/4 = 5 elemente."

  - tip: grila
    dificultate: licenta
    enunt: "Ce valoare are f (factorial) după buclă?"
    cod: |
      int n = 5, f = 1, i;
      for (i = 1; i <= n; i++)
          f *= i;
      printf("%d", f);
    timp: 50
    variante: [ "24", "720", "60", "120" ]
    corect: 3
    explicatie: "f acumulează 1*1*2*3*4*5 = 120, adică 5! (factorial de 5)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul? Atenție la operatorul folosit în condiție."
    cod: |
      int x = 10;
      if (x = 0)
          printf("DA");
      else
          printf("NU");
    timp: 50
    variante: [ "NU", "0", "DA", "Eroare de compilare" ]
    corect: 0
    explicatie: "'x = 0' este o atribuire (nu comparație ==); valoarea 0 este falsă,
      deci se execută ramura else: 'NU'."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează programul (deplasare la dreapta)?"
    cod: |
      int a = 7;
      printf("%d", a >> 1);
    timp: 50
    variante: [ "3", "2", "14", "7" ]
    corect: 0
    explicatie: "Deplasarea la dreapta cu 1 împarte la 2 (întreg): 7 >> 1 = 3 (0111
      devine 0011)."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Cât este suma 1 + 2 + 3 + ... + 100 (rezultatul buclei
      'for(i=1;i<=100;i++) s+=i;')?"
    corect: 5050
    explicatie: "Suma primelor 100 de numere naturale este n(n+1)/2 = 100*101/2 = 5050."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Aproximativ ce valoare are 2 la puterea 10 (rezultatul lui '1 << 10')?"
    corect: 1024
    explicatie: "Deplasarea '1 << 10' înmulțește 1 cu 2 de zece ori: 2^10 = 1024."

