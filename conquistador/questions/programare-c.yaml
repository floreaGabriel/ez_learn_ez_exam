  - tip: grila
    dificultate: licenta
    enunt: "Care variantă conține o GREȘEALĂ ce duce la accesarea în afara tabloului
      'int a[5];'?"
    variante:
      [
        "for(i = 0; i < 5; i++) a[i] = 0;",
        "for(i = 0; i <= 5; i++) a[i] = 0;",
        "for(i = 4; i >= 0; i--) a[i] = 0;",
        "a[0] = 1; a[4] = 2;"
      ]
    corect: 1
    explicatie: "Condiția 'i <= 5' ajunge la i = 5 și accesează a[5], inexistent
      (indici valizi 0..4); este o eroare off-by-one."

