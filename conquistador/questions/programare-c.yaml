      FILE *f = fopen("date.txt", "w");
    timp: 50
    variante:
      [
        "Fișierul se deschide și se golește",
        "Se deschide doar pentru citire",
        "Eroare, pentru că fișierul există deja",
        "Fișierul se păstrează și se scrie la final"
      ]
    corect: 0
    explicatie: "Modul 'w' creează fișierul sau îl trunchiază la lungime zero dacă
      există deja, deci se golește."

  - tip: grila
    dificultate: licenta
    enunt: "Ce lipsește pentru un cod corect?"
    cod: |
      FILE *f = fopen("date.txt", "r+");
      int x;
      fscanf(f, "%d", &x);
      fprintf(f, "%d", x + 1);
    timp: 50
    variante:
      [
        "Nimic",
        "fprintf nu merge cu r+",
        "free(f)",
        "Un fseek, rewind sau altă operație de poziționare între citire și
          scriere"
      ]
    corect: 3
    explicatie: "În mod update (+), între o citire și o scriere trebuie o operație
      de poziționare (fseek/rewind/fflush)."
