  - tip: grila
    dificultate: licenta
    enunt: "În problema producător-consumator cu buffer de capacitate N, cum se
      inițializează corect semafoarele empty, full și mutex?"
    timp: 50
    variante:
      - "empty = 0, full = N, mutex = 1"
      - "empty = 1, full = 1, mutex = N"
      - "empty = N, full = N, mutex = 0"
      - "empty = N, full = 0, mutex = 1"
    corect: 3
    explicatie: "La început toate cele N locuri sunt libere (empty = N), niciun
      element nu este produs (full = 0), iar mutex = 1 asigură acces exclusiv la
      buffer. Pe tot parcursul se păstrează invariantul empty + full = N."

  - tip: grila
    dificultate: licenta
    enunt: "De ce producătorul trebuie să facă wait(empty) ÎNAINTE de wait(mutex),
      nu invers?"
    timp: 50
    variante:
      - "Pentru ca semaforul empty să fie inițializat corect"
      - "Altfel, un producător blocat pe buffer plin ar ține mutexul ocupat și
        ar bloca consumatorii -> deadlock"
      - "Pentru a consuma mai puțină memorie"
      - "Pentru viteză, ordinea nu schimbă corectitudinea"
    corect: 1
    explicatie: "Dacă s-ar face întâi wait(mutex) și buffer-ul ar fi plin,
      producătorul s-ar bloca pe wait(empty) ținând în continuare mutexul.
      Niciun consumator nu ar mai putea intra ca să scoată un element și să
      elibereze un loc -> deadlock. De aceea semaforul de numărare se ia
      înaintea mutexului."

  - tip: grila
    dificultate: licenta
    enunt: "Două fire folosesc semafoarele s1 = 1, s2 = 0. Ce șir se tipărește,
      ordinea fiind forțată de semafoare?"
    cod: |
      Init: s1 = 1, s2 = 0
      Thread A: wait(s1) '1' post(s2)  wait(s1) '2' post(s2)
      Thread B: wait(s2) '3' post(s1)  wait(s2) '4' post(s1)
    timp: 50
    variante:
      - "1342"
      - "Ordine nedeterministă"
      - "1234"
      - "1324 (repetat: 1324 1324 ...)"
    corect: 3
    explicatie: "B se blochează imediat pe wait(s2) deoarece s2 = 0. A trece (s1=1):
      tipărește '1', face post(s2). B se deblochează: '3', post(s1). A: '2',
      post(s2). B: '4', post(s1). Ordinea forțată este 1-3-2-4."

  - tip: grila
    dificultate: licenta
    enunt: "Care algoritm de planificare este versiunea PREEMPTIVĂ a lui SJF
      (Shortest Job First)?"
    timp: 50
    variante:
      - "SRTF (Shortest Remaining Time First)"
      - "Round-Robin (RR)"
      - "Planificare pe priorități statice"
      - "FCFS (First Come First Served)"
    corect: 0
    explicatie: "SRTF este SJF preemptiv: dacă sosește un proces cu timp rămas mai
      mic decât al celui în execuție, planificatorul îl întrerupe pe cel curent.
      Obține un timp mediu de așteptare și mai mic decât SJF nepreemptiv."

  - tip: grila
    dificultate: licenta
    enunt: "Mai multe fire trebuie să ocupe aceleași două mutex-uri A și B. Care
      este cea mai practică metodă de a PREVENI deadlock-ul?"
    timp: 50
    variante:
      - "Se folosesc spinlock-uri în loc de mutex-uri"
      - "Toate firele ocupă lacătele într-o ordine globală fixă (mereu A apoi B)"
      - "Fiecare fir ia lacătele în ordine inversă față de celelalte"
      - "Se mărește cuanta de timp a planificatorului"
    corect: 1
    explicatie: "Impunând o ordine globală de achiziție (toți iau A înainte de B) se
      sparge condiția Coffman de așteptare circulară, deci deadlock-ul devine
      imposibil. Dacă firele ar lua lacătele în ordini diferite, s-ar putea
      forma exact ciclul care produce blocajul."

  - tip: grila
    dificultate: licenta
    enunt: "MMU traduce o adresă logică folosind un registru de relocare (relocation
      register). Pentru adresa logică 346 și registrul de relocare 14000, care
      este adresa fizică?"
    timp: 50
    variante: [ "14346", "13654", "14000", "346" ]
    corect: 0
    explicatie: "Cu relocare prin bază simplă, MMU adună conținutul registrului de
      relocare la adresa logică: 14000 + 346 = 14346."

  - tip: grila
    dificultate: licenta
    enunt: "Tabela de segmente are pentru segmentul 1: limit = 400, base = 6300. Ce
      se întâmplă la accesul <segment = 1, offset = 500>?"
    timp: 50
    variante:
      - "Adresa fizică 500"
      - "Adresa fizică 6300"
      - "Trap (addressing error), deoarece offset >= limit"
      - "Adresa fizică 6800"
    corect: 2
    explicatie: "Hardware-ul verifică offset < limit. Cum 500 >= 400, accesul iese
      din segment și se generează un trap (addressing error). Pentru un offset
      valid (de exemplu 53 < 400) adresa fizică ar fi base + offset = 6300 + 53
      = 6353."

  - tip: grila
    dificultate: licenta
    enunt: "Alocare First-Fit. Procesele cer, în ordine, P1=90, P2=50, P3=30, P4=40.
      Blocurile libere (în ordine) sunt: 20, 100, 40, 200, 10. Care proces NU
      mai poate fi alocat?"
    cod: |
      Blocuri libere:  20 | 100 | 40 | 200 | 10
      P1=90 -> bloc 100 (ramane 10)
      P2=50 -> bloc 200 (ramane 150)
      P3=30 -> bloc 40  (ramane 10)
      P4=40 -> ?
    timp: 50
    variante: [ "P2", "P3", "P4", "P1" ]
    corect: 2
    explicatie: "First-Fit alege primul bloc suficient de mare: P1(90)->100,
      P2(50)->200, P3(30)->40. Rămân libere doar resturile mici (20, 10 și
      fragmentele rămase), toate sub 40, deci P4(40) nu mai încape -> rămâne
      nealocat."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Algoritm FIFO de înlocuire a paginilor, 3 cadre, șirul de referințe: 1 2
      3 4 1 2 5. Câte page fault-uri apar?"
    cod: |
      [1]      fault
      [1 2]    fault
      [1 2 3]  fault
      [2 3 4]  fault (scot 1)
      [3 4 1]  fault (scot 2)
      [4 1 2]  fault (scot 3)
      [1 2 5]  fault (scot 4)
    timp: 50
    corect: 7
    explicatie: "Fiecare dintre cele 7 referințe produce un page fault: în momentul
      reaccesării lui 1 și 2 acestea fuseseră deja evacuate de FIFO. Total = 7
      page fault-uri (acest șir ilustrează și anomalia Belady la FIFO)."

  - tip: grila
    dificultate: licenta
    enunt: "Care page fault este tratat RAPID, fără acces la disc?"
    timp: 50
    variante:
      - "Niciunul, orice page fault implică acces la disc"
      - "Major page fault — pagina trebuie adusă din swap / de pe disc"
      - "Minor page fault — cadrul este deja în RAM, lipsește doar maparea"
      - "Ambele necesită întotdeauna acces la disc"
    corect: 2
    explicatie: "La un minor page fault cadrul este deja prezent în memoria fizică
      (de exemplu o bibliotecă partajată deja încărcată) și se actualizează doar
      maparea în tabela de pagini — rapid. Major page fault necesită aducerea
      paginii de pe disc (swap / demand paging) și este lent."

  - tip: grila
    dificultate: licenta
    enunt: "Într-un program proaspăt pornit, ce descriptor întoarce primul
      open()/fopen() reușit?"
    timp: 50
    variante: [ "3", "1", "2", "0" ]
    corect: 0
    explicatie: "Descriptorii 0, 1, 2 sunt deja ocupați (stdin, stdout, stderr), iar
      open() întoarce mereu cel mai mic descriptor liber. Primul fișier deschis
      primește deci 3, al doilea 4. După un close(3), un open() ulterior reia
      descriptorul 3."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Un sistem de fișiere are un director rădăcină, 5 subdirectoare, iar
      fiecare subdirector conține câte 5 fișiere. Câte dentry-uri (intrări de
      director) are în total, numărând și intrările '.' și '..'?"
    cod: |
      Nume proprii: 5 subdirectoare + 5*5 fisiere = 30
      Intrari '.' : radacina + 5 subdir          =  6
      Intrari '..': cele 5 subdir -> parinte      =  5
    timp: 50
    corect: 41
    explicatie: "Un dentry este o pereche {nume, inode}. Intrări cu nume propriu: 5
      subdirectoare + 25 fișiere = 30. Fiecare director are intrarea '.': 1
      rădăcină + 5 subdirectoare = 6. Fiecare subdirector are '..' către
      părinte: 5. Total = 30 + 6 + 5 = 41."

  - tip: grila
    dificultate: licenta
    enunt: "Un sistem are spațiu de adrese pe 16 biți și pagini de 256 octeți.
      Adresa logică 0x1A2B are pagina 0x1A mapată la cadrul 0x0C. Care este
      adresa fizică?"
    cod: |
      Pagina = 256 = 2^8  -> offset pe 8 biti
      Adresa logica 0x1A2B = [ pagina 0x1A | offset 0x2B ]
      pagina 0x1A -> cadrul 0x0C
      adresa fizica = [ cadru 0x0C | offset 0x2B ]
    timp: 50
    variante: [ "0x0C2B", "0x2B0C", "0x0C00", "0x1A0C" ]
    corect: 0
    explicatie: "Pagina de 256 = 2^8 octeți dă un offset pe 8 biți (octetul
      inferior). Se înlocuiește numărul de pagină (0x1A) cu numărul de cadru
      (0x0C), păstrând offset-ul 0x2B: adresa fizică = 0x0C2B (3115 zecimal)."

  - tip: grila
    dificultate: licenta
    enunt: "Care este un avantaj al unui microkernel față de un kernel monolitic?"
    timp: 50
    variante:
      - "Are TCB (Trusted Computing Base) mai mic -> mai sigur și modular"
      - "Este întotdeauna mai rapid decât monoliticul"
      - "Rulează tot codul (FS, drivere) în modul kernel"
      - "Nu are nevoie de mecanisme IPC"
    corect: 0
    explicatie: "Microkernelul păstrează în nucleu doar IPC, gestiunea memoriei și
      planificarea; serviciile (sistem de fișiere, drivere) rulează ca servere
      în user space. Rezultă un TCB mai mic, mai sigur și modular. Dezavantaj:
      mai lent, din cauza comunicării prin IPC între componente."

  # ===== Adăugate din „PSO Course Questions" (răspunsuri compacte) =====
