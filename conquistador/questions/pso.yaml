    corect: 0
    explicatie: "Socket-ul UNIX comunică între procese de pe aceeași mașină (evită protocoalele de rețea, deci e mai rapid); socket-ul de rețea comunică prin rețea."

  # Memorie
  - tip: grila
    dificultate: licenta
    enunt: "Ce rol are tabela de pagini?"
    variante:
      - "Ține asocierea dintre paginile virtuale și cele fizice"
      - "Stochează codul executabil al tuturor proceselor din sistem"
      - "Reține lista fișierelor deschise de un proces"
      - "Păstrează ordinea de planificare a proceselor pe procesor"
    corect: 0
    explicatie: "Tabela de pagini mapează paginile virtuale ale unui proces la frame-urile fizice corespunzătoare."

  - tip: grila
    dificultate: licenta
    enunt: "Ce conține, în mod uzual, o intrare din tabela de pagini?"
    variante:
      - "Adresa fizică (frame-ul), permisiunile și bitul valid/invalid"
      - "Numele complet al procesului, prioritatea sa și cuanta de timp alocată"
      - "Doar adresa virtuală a paginii"
      - "Conținutul complet al paginii de 4 KiB"
    corect: 0
    explicatie: "O intrare reține frame-ul fizic, biții de permisiuni (r/w/x) și bitul valid/invalid (dacă maparea e prezentă)."

  - tip: grila
    dificultate: licenta
    enunt: "Când are loc un TLB miss?"
    variante:
      - "Când page frame number-ul căutat nu se găsește în TLB"
      - "Când procesul încearcă să scrie într-o pagină marcată read-only"
      - "La fiecare schimbare de context între două procese"
      - "Când memoria fizică este complet ocupată"
    corect: 0
    explicatie: "TLB miss = traducerea nu e în cache (TLB); se merge în tabela de pagini, iar intrarea găsită înlocuiește una din TLB."

  - tip: grila
    dificultate: licenta
    enunt: "De ce NU e nevoie de TLB flush la schimbarea de context între două thread-uri ale aceluiași proces?"
    variante:
      - "Pentru că fiecare thread primește un TLB propriu, complet separat de al celorlalte fire"
      - "Pentru că thread-urile aparțin aceluiași proces, deci au aceeași mapare virtual–fizic"
      - "Pentru că TLB-ul se golește automat la fiecare instrucțiune executată"
      - "Pentru că thread-urile nu accesează memoria virtuală"
    corect: 1
    explicatie: "Thread-urile unui proces partajează spațiul de adrese (aceeași mapare), deci TLB-ul rămâne valid — nu trebuie golit."

  - tip: grila
    dificultate: licenta
    enunt: "Ce înseamnă demand paging?"
    variante:
      - "O pagină este adusă de pe disc doar în momentul în care e accesată"
      - "Toate paginile unui proces sunt încărcate în memorie la pornire"
      - "Paginile sunt scrise pe disc preventiv, înainte de a fi cerute"
      - "Procesul cere explicit, printr-un apel de sistem, fiecare pagină de care are nevoie"
    corect: 0
    explicatie: "La demand paging, o pagină e încărcată (printr-un page fault minor) abia când se face primul acces la ea."

  - tip: grila
    dificultate: licenta
    enunt: "Ce diferență este între swap in și swap out?"
    variante:
      - "Swap in aduce o pagină din swap în memorie; swap out o evacuează pe disc"
      - "Swap in pornește procesul, swap out îl termină definitiv"
      - "Sunt sinonime pentru aceeași operație de copiere pe disc"
      - "Swap in mărește dimensiunea fizică a memoriei RAM, iar swap out o reduce la nivel hardware"
    corect: 0
    explicatie: "Swap in = o pagină e adusă din spațiul de swap în memorie; swap out = o pagină e evacuată din memorie în swap."

