  - tip: grila
    dificultate: licenta
    enunt: "Care este rolul unui device driver?"
    variante:
      - "Traduce comenzile SO în comenzi pe care le înțelege echipamentul (și invers)"
      - "Alocă și gestionează memoria fizică necesară fiecărui proces care folosește dispozitivul"
      - "Planifică ordinea în care procesele primesc acces la procesor"
      - "Criptează datele înainte de a fi scrise pe disc"
    corect: 0
    explicatie: "Driverul este puntea dintre SO și un dispozitiv: traduce comenzile/semnalele într-un sens și în celălalt."

  - tip: grila
    dificultate: licenta
    enunt: "Ce rol are mecanismul DMA (Direct Memory Access)?"
    variante:
      - "Permite dispozitivelor I/O să transfere date direct cu memoria, fără CPU"
      - "Mărește frecvența procesorului în momentele de încărcare mare a sistemului"
