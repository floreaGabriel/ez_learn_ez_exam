    variante:
      - "Expirarea cuantei de timp sau blocarea procesului în așteptarea I/O"
      - "Citirea unei variabile locale din stivă"
      - "Apelul unei funcții obișnuite definite în aceeași bibliotecă cu programul apelant"
      - "Incrementarea unui registru al procesorului"
    corect: 0
    explicatie: "Schimbarea de context apare la: yield, expirarea cuantei, sosirea unui proces cu prioritate mai mare, terminare sau blocare în I/O."

  - tip: grila
    dificultate: licenta
    enunt: "Ce reprezintă waiting time-ul (timpul de așteptare) în planificare?"
    variante:
      - "Timpul total petrecut de proces în starea READY"
      - "Timpul în care procesul rulează efectiv pe procesor"
      - "Timpul scurs din momentul sosirii până la terminarea completă a procesului"
      - "Durata unei singure cuante de timp"
    corect: 0
    explicatie: "Waiting time = timpul petrecut de proces în coada READY, așteptând procesorul. (Turnaround = sosire → terminare.)"

  - tip: grila
    dificultate: licenta
    enunt: "Ce efect are operatorul & la finalul unei comenzi în shell?"
    variante:
      - "Comanda rulează în fundal (background), shell-ul nu o mai așteaptă"
      - "Comanda rulează cu prioritate maximă pe procesor"
      - "Output-ul comenzii devine input pentru următoarea comandă"
      - "Comanda este executată repetat, într-o buclă infinită, până la oprire manuală"
    corect: 0
    explicatie: "& pornește comanda în background: părintele (shell-ul) nu o mai așteaptă; procesul poate deveni zombie/adoptat de init."

  - tip: grila
    dificultate: licenta
    enunt: "În ce situație este utilă zona TLS (Thread Local Storage)?"
    variante:
      - "Când vrem o instanță separată a unei variabile pentru fiecare thread"
      - "Când vrem ca toate thread-urile să partajeze aceeași variabilă globală"
      - "Pentru a cripta traficul de rețea al firelor de execuție"
      - "Pentru a stoca pe disc întreaga stare a tuturor proceselor înainte de swap out"
    corect: 0
    explicatie: "TLS dă fiecărui thread propria copie a unei variabile (deși numele e același), evitând partajarea nedorită."

  - tip: grila
    dificultate: licenta
    enunt: "Ce caracterizează un proces I/O intensive (I/O bound)?"
    variante:
      - "Rulează rar pe procesor și face multe operații de intrare/ieșire"
      - "Folosește procesorul intens, fără a aștepta aproape niciodată I/O"
      - "Nu folosește deloc memoria, doar procesorul"
      - "Are întotdeauna prioritate minimă și nu poate fi planificat preemptiv"
    corect: 0
    explicatie: "Un proces I/O bound petrece mult timp așteptând I/O și rulează rar pe CPU (opusul lui CPU bound). Planificatorul îi dă deseori cuante mai mari."

  # Sincronizare
  - tip: grila
    dificultate: licenta
    enunt: "Ce este un livelock și cum diferă de un deadlock?"
    variante:
      - "Procesele sunt complet oprite, fiecare așteptând la nesfârșit o resursă deținută de altul"
      - "Procesele rulează activ și își schimbă mereu starea, dar niciunul nu progresează"
      - "O singură eroare de memorie care oprește tot sistemul de operare"
      - "Starea normală în care toate procesele așteaptă în coada READY"
    corect: 1
    explicatie: "La livelock procesele NU sunt blocate — rulează și își schimbă constant starea ca răspuns una la alta, dar niciunul nu avansează. La deadlock procesele sunt blocate (în așteptare)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce înseamnă TOCTTOU (time of check to time of use)?"
    variante:
      - "Eroare cauzată de modificarea stării între verificarea unei condiții și folosirea resursei"
      - "O tehnică de planificare bazată pe ora exactă a sistemului"
      - "Un mecanism avansat de sincronizare bazat pe semafoare numărătoare combinate cu cozi de prioritate multiple"
      - "Verificarea periodică a integrității memoriei la fiecare cuantă de timp"
    corect: 0
    explicatie: "TOCTTOU: o condiție e verificată (ex. drept de acces), dar starea se schimbă înainte de folosirea efectivă a resursei — clasă de erori de sincronizare/securitate."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este o funcție thread-safe?"
    variante:
      - "O funcție care poate fi apelată corect din mai multe thread-uri simultan"
      - "O funcție care rulează doar în kernel mode"
      - "O funcție care, odată pornită, nu poate fi întreruptă de niciun semnal până nu se termină"
      - "O funcție care se execută întotdeauna pe un singur procesor"
    corect: 0
    explicatie: "Thread-safe = poate fi apelată în siguranță simultan din mai multe fire (prin acces exclusiv, TLS, operații atomice etc.)."

  # IPC & stiva software
  - tip: grila
    dificultate: licenta
    enunt: "Care dintre următoarele este o formă de comunicare inter-proces (IPC)?"
    variante:
      - "Memoria partajată (shared memory)"
      - "Tabela de pagini a procesului"
      - "Registrul de relocare al MMU"
      - "Cache-ul de nivel L1 al procesorului, partajat între toate firele"
    corect: 0
    explicatie: "Forme IPC: semnale, pipe, memorie partajată, socket-uri, fișiere, cozi de mesaje."

  - tip: grila
    dificultate: licenta
    enunt: "Cum este implementat operatorul | (pipe) din shell?"
    variante:
      - "Output-ul primei comenzi devine input-ul celei de-a doua"
      - "Cele două comenzi rulează complet independent, fără să schimbe date între ele"
      - "A doua comandă rulează doar dacă prima eșuează"
      - "Ambele comenzi scriu în același fișier de pe disc"
    corect: 0
    explicatie: "| leagă ieșirea standard a primei comenzi la intrarea standard a celei de-a doua."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este o bibliotecă (library) în contextul programării?"
    variante:
      - "O colecție de funcții precompilate, reutilizabile"
      - "Un proces special care rulează permanent în fundal"
      - "Zona de memorie în care se stochează variabilele globale ale unui program"
      - "Un fișier care conține doar codul sursă, necompilat"
    corect: 0
    explicatie: "O bibliotecă e o colecție de funcții precompilate; linker-ul/loader-ul leagă funcția cerută de program."

  - tip: grila
    dificultate: licenta
    enunt: "Ce caracterizează un sistem de operare monolitic?"
    variante:
      - "Tot managementul resurselor hardware e într-un singur spațiu de adrese (kernel)"
      - "Driverele și serviciile rulează în user-space, separat de nucleu"
      - "Nu permite rularea mai multor procese în paralel"
      - "Fiecare driver rulează ca un proces izolat, complet separat de restul nucleului"
    corect: 0
    explicatie: "La un kernel monolitic, toate componentele de management hardware sunt în același spațiu de adrese (mai eficient, dar suprafață de atac mai mare). Driverele în user-space caracterizează microkernel-ul."

  - tip: grila
    dificultate: licenta
    enunt: "Cum diferă un executabil static-linked de unul dynamic-linked?"
    variante:
      - "Cel static include tot codul bibliotecilor în el (mai mare, dar portabil)"
      - "Cel static încarcă bibliotecile abia la rulare, din memorie"
      - "Cel dinamic nu poate folosi deloc biblioteci externe"
      - "Cel dinamic copiază întreg conținutul bibliotecilor în fișierul executabil final"
    corect: 0
    explicatie: "La static linking, codul bibliotecilor e copiat în executabil (mai mare, portabil, mai rapid); la dynamic linking, biblioteca e încărcată la rulare."

  - tip: grila
    dificultate: licenta
    enunt: "Care este un exemplu de apel de sistem BLOCANT?"
    variante:
