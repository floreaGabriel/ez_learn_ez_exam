    corect: 0
    explicatie: "DMA permite transferul direct între dispozitiv și memoria principală, fără implicarea CPU-ului, sporind viteza."

  - tip: grila
    dificultate: licenta
    enunt: "Când este preferabil polling-ul în locul întreruperilor?"
    variante:
      - "Întotdeauna, fiindcă întreruperile nu mai sunt suportate de procesoarele moderne de astăzi"
      - "Când ar apărea foarte multe întreruperi (ex. transfer rapid pe placa de rețea)"
      - "Doar la pornirea sistemului de operare"
