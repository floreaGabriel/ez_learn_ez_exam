  - tip: adevarat_fals
    dificultate: licenta
    enunt: "TLB-ul (Translation Lookaside Buffer) este un cache hardware al
      traducerilor adresă virtuală -> adresă fizică."
    corect: 0
    explicatie: "Adevărat: TLB-ul memorează cele mai recente intrări din tabela de
      pagini, accelerând translatarea adreselor virtuale în fizice și evitând un
      acces suplimentar la memorie pentru tabela de pagini."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Toate firele (thread-urile) aceluiași proces partajează spațiul de
      adrese (heap, date globale), dar fiecare fir are propria stivă și proprii
      regiștri."
    corect: 0
    explicatie: "Adevărat: firele unui proces împart heap-ul, variabilele globale și
      descriptorii de fișiere, însă fiecare fir are stivă proprie, propriul PC și
      set de regiștri, pentru a-și păstra contextul de execuție."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Un spinlock pune firul în starea blocat (sleep) atunci când lock-ul este
      deja ocupat, eliberând astfel procesorul pentru alte fire."
    corect: 1
    explicatie: "Fals: spinlock-ul face busy-waiting (așteaptă activ, ocupând CPU)
      cât timp lock-ul este ocupat, fiind potrivit pentru secțiuni critice
      scurte. Mutex-ul, în schimb, pune firul în sleep."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "O barieră (barrier) eliberează un grup de fire să continue abia după ce
      TOATE firele participante au ajuns în punctul de sincronizare."
    corect: 0
    explicatie: "Adevărat: bariera oprește fiecare fir ajuns în punct; numai când
      ultimul fir sosește, toate firele sunt eliberate simultan. Este folosită
      pentru a sincroniza fazele unui calcul paralel."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Operația P (wait) asupra unui semafor îi incrementează valoarea, iar
      operația V (signal) i-o decrementează."
    corect: 1
    explicatie: "Fals: este exact invers. P (wait) DECREMENTEAZĂ semaforul (și
      blochează firul dacă ar deveni negativ), iar V (signal) îl INCREMENTEAZĂ,
      eventual deblocând un fir care aștepta."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Un proces care s-a terminat dar al cărui părinte nu a apelat încă wait()
      pentru a-i citi codul de ieșire se numește proces zombie."
    corect: 0
    explicatie: "Adevărat: procesul zombie și-a încheiat execuția, dar intrarea lui
      rămâne în tabela de procese până când părintele citește exit status-ul cu
      wait(); un proces orfan este, în schimb, unul al cărui părinte s-a terminat
      înaintea lui."

  - tip: adevarat_fals
    dificultate: licenta
    enunt: "Un page fault apare ori de câte ori un proces accesează o adresă de
      memorie ilegală (în afara spațiului său de adrese) și duce întotdeauna la
      terminarea procesului."
    corect: 1
    explicatie: "Fals: page fault-ul apare când pagina referită nu este prezentă în
      RAM și, de regulă, este tratat normal (nucleul aduce pagina prin demand
      paging și reia instrucțiunea). Accesul la o adresă ilegală generează un
      segmentation fault, nu un simplu page fault."

  # ---- grila cu SCHEMĂ (cod) — întrebări mai grele, timp: 50 ----
  - tip: grila
    dificultate: licenta
    enunt: "În diagrama de stări a unui proces de mai jos, ce tranziție corespunde
      etichetei 'scheduler dispatch'?"
    cod: |
      [new] --admitted--> [ready] --dispatch--> [running] --exit--> [terminated]
                             ^                       |
                             +--I/O completion-- [waiting] <--I/O wait--+
    timp: 50
    variante:
      - "Trecerea procesului din RUNNING in WAITING"
      - "Trecerea procesului din READY in RUNNING"
      - "Trecerea procesului din NEW in READY"
      - "Trecerea procesului din RUNNING in TERMINATED"
    corect: 1
    explicatie: "scheduler dispatch este momentul in care planificatorul alege un
      proces din coada READY si il pune sa ruleze pe procesor (READY ->
      RUNNING). Tranzitia inversa (RUNNING -> READY) este declansata de o
      intrerupere (interrupt), de exemplu expirarea cuantei."

  - tip: grila
    dificultate: licenta
    enunt: "În layout-ul de memorie virtuală al unui proces de mai jos, în ce zonă
      este alocată memoria dinamică obținută cu malloc()?"
    cod: |
      adrese mari
        +----------------------+  kernel space
        +----------------------+
        |        stack         |  (creste in jos)
        |          |           |
        |          v           |
        +----------------------+
        |   memory mapping     |  (libc.so etc.)
        +----------------------+
        |          ^           |
        |          |           |
        |         heap         |  (creste in sus)
        +----------------------+
        |  bss / data / text   |
        +----------------------+
      adrese mici (0)
    timp: 50
    variante: [ "bss", "text", "stack", "heap" ]
    corect: 3
    explicatie: "malloc()/new alocă memorie dinamică pe heap, care creste de la
      adrese mici spre adrese mari (program break / brk). Stiva crește invers,
      de sus în jos; text/data/bss au dimensiune stabilită la încărcare."

  - tip: grila
    dificultate: licenta
    enunt: "Privind secțiunea de cod de mai jos executată după fork(), ce ramură
      execută PROCESUL COPIL?"
    cod: |
      pid = fork();
      if (pid < 0)        { /* ramura A */ }
      else if (pid == 0)  { /* ramura B */ }
      else                { /* ramura C */ }
    timp: 50
    variante:
      - "Ramura B (pid == 0)"
      - "Nicio ramură, copilul nu execută acest cod"
      - "Ramura C (else)"
      - "Ramura A (pid < 0)"
    corect: 0
    explicatie: "În copil fork() întoarce 0, deci se execută ramura B. În părinte
      întoarce PID-ul copilului (>0, ramura C), iar la eroare întoarce -1
      (ramura A). Copilul moștenește codul părintelui și continuă din același
      punct."

  - tip: grila
    dificultate: licenta
    enunt: "Privind secvența de mai jos, care este efectul tipic al combinației
      fork() + exec()?"
    cod: |
      pid = fork();          // se creeaza un proces copil (duplicat)
      if (pid == 0) {
          execv("/bin/ls", argv);   // in copil
      }
      wait(NULL);            // in parinte
    timp: 50
    variante:
      - "Copilul devine un proces nou care rulează /bin/ls, iar părintele
        așteaptă terminarea lui"
      - "exec() creează un al treilea proces"
      - "wait() este apelat de copil, nu de părinte"
      - "Atât părintele, cât și copilul ajung să ruleze /bin/ls"
    corect: 0
    explicatie: "fork() creează copilul (duplicat al părintelui); în copil exec()
      înlocuiește imaginea cu /bin/ls (păstrând PID-ul), iar părintele apelează
      wait() ca să aștepte terminarea copilului. Acesta este modelul standard de
      lansare a unui program nou în Unix."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru tabelul de planificare FCFS de mai jos (procese sosite la t=0 în
      ordinea P1, P2, P3), cât este timpul mediu de AȘTEPTARE?"
    cod: |
      Proces | Sosire | Durata (burst)
      -------+--------+---------------
        P1   |   0    |     6 ms
        P2   |   0    |     8 ms
        P3   |   0    |     4 ms
      Ordine FCFS:  | P1 | P2 | P3 |
                    0    6    14   18
    timp: 50
    variante: [ "20 ms", "6 ms", "8 ms", "12 ms" ]
    corect: 1
    explicatie: "Timpii de așteptare: P1=0, P2=6, P3=14. Media = (0+6+14)/3 = 20/3 ≈
      6,67 ms, deci cel mai apropiat răspuns este 6 ms. FCFS este nepreemptiv și
      servește procesele în ordinea sosirii."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru cele două procese de mai jos planificate Round-Robin cu cuanta q
      = 4 ms, în ce ordine ocupă procesorul primele 3 cuante?"
    cod: |
      Proces | Durata
      -------+-------
        P1   |  8 ms
        P2   |  4 ms
      RR, q = 4 ms:
        slot1   slot2   slot3
        [ ? ]   [ ? ]   [ ? ]
    timp: 50
    variante:
      - "P1, P1, P2"
      - "P1, P2, P1"
      - "P1, P2, P2"
      - "P2, P1, P2"
    corect: 1
    explicatie: "Round-Robin acordă fiecărui proces o cuantă pe rând: slot1 = P1
      (rămâne 4 ms), slot2 = P2 (se termină), slot3 = P1 (se termină). Deci
      ordinea cuantelor este P1, P2, P1."

  # ---- grila normale, concepte cheie neacoperite ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce rol are unitatea MMU (Memory Management Unit) într-un sistem cu
      memorie virtuală?"
