  - tip: grila
    dificultate: licenta
    enunt: "Ce returnează în variabila last apelul last = signal(SIGINT, handler)?"
    timp: 50
    variante:
      - "Întotdeauna SIG_DFL"
      - "0 la succes, -1 la eroare"
      - "Handlerul ANTERIOR (cel activ înainte de apel)"
      - "Noul handler instalat (handler)"
    corect: 2
    explicatie: "signal() instalează noul handler ȘI întoarce dispozitia ANTERIOARĂ.
