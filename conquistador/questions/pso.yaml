# ============================================================
#  Banca de întrebări — PSO (Programarea Sistemelor de Operare)
#  Nivel: examen de licență.
# ============================================================
topic: pso
nume: "Programarea Sistemelor de Operare"
intrebari:
  - tip: grila
    dificultate: licenta
    enunt: "Ce returnează apelul fork() în procesul COPIL, la succes?"
    variante: [ "PID-ul părintelui", "0", "PID-ul copilului", "-1" ]
    corect: 1
    explicatie: "În copil fork() returnează 0; în părinte returnează PID-ul
      copilului; -1 la eroare."

  - tip: grila
    dificultate: licenta
    enunt: "Un proces care s-a terminat dar al cărui părinte nu a apelat încă wait()
      este:"
    variante: [ "Proces orfan", "Proces zombie", "Proces daemon", "Proces suspendat" ]
    corect: 1
    explicatie: "Procesul zombie a terminat execuția, dar intrarea lui rămâne în
      tabela de procese până când părintele citește codul de ieșire cu wait()."

  - tip: grila
    dificultate: licenta
    enunt: "Care dintre următoarele NU este partajat între firele (thread-urile)
      aceluiași proces?"
    variante:
      [
        "Spațiul de adrese (heap)",
        "Stiva (stack)",
        "Variabilele globale",
        "Descriptorii de fișiere"
      ]
    corect: 1
    explicatie: "Fiecare fir are propria stivă (și propriii regiștri/PC); heap-ul,
      globalele și descriptorii sunt partajate."

  - tip: grila
    dificultate: licenta
    enunt: "Un semafor binar inițializat cu 1, folosit pentru excludere mutuală, mai
      este numit:"
    variante: [ "Mutex", "Barieră", "Monitor", "Pipe" ]
    corect: 0
    explicatie: "Un semafor binar (0/1) folosit pentru secțiune critică se comportă
      ca un mutex (lock/unlock)."

  - tip: grila
    dificultate: licenta
    enunt: "Care este una dintre cele patru condiții Coffman necesare pentru
      deadlock?"
    variante:
      - "Așteptare circulară (circular wait)"
      - "Partajarea tuturor resurselor"
      - "Preempțiune forțată a resurselor"
      - "Planificare round-robin"
    corect: 0
    explicatie: "Cele 4 condiții Coffman: excludere mutuală, hold-and-wait, fără
      preempțiune și așteptare circulară — toate necesare simultan."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Câte procese NOI creează în total un singur apel fork() reușit?"
    corect: 1
    explicatie: "Un fork() creează exact un proces copil; după apel există 2 procese
      (părinte + copil)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce face apelul exec() (familia execv/execl) asupra procesului curent?"
    variante:
      - "Înlocuiește imaginea procesului cu un alt program"
      - "Termină procesul și eliberează resursele"
      - "Suspendă procesul până la un semnal"
      - "Creează un proces copil identic"
    corect: 0
    explicatie: "exec() înlocuiește codul/datele procesului curent cu un program
      nou, păstrând PID-ul; nu creează proces nou."

  - tip: grila
    dificultate: licenta
    enunt: "Ce semnal trimis unui proces NU poate fi nici prins, nici ignorat?"
    variante: [ "SIGINT", "SIGUSR1", "SIGKILL", "SIGTERM" ]
    corect: 2
    explicatie: "SIGKILL (9) și SIGSTOP nu pot fi interceptate, blocate sau ignorate
      — opresc procesul necondiționat."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Ce valoare numerică are semnalul SIGKILL în Linux?"
    corect: 9
    explicatie: "SIGKILL are numărul 9 — de aceea `kill -9 PID` oprește forțat un proces."

  - tip: grila
    dificultate: licenta
    enunt: "Un pipe anonim (creat cu pipe()) permite comunicarea între:"
    variante:
      - "Doar fire ale aceluiași proces"
      - "Orice două procese din sistem"
      - "Procese înrudite (părinte-copil)"
      - "Procese de pe mașini diferite"
    corect: 2
    explicatie: "Pipe-ul anonim funcționează doar între procese înrudite, care
      moștenesc descriptorii prin fork()."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte condiții Coffman trebuie îndeplinite simultan pentru a apărea un
      deadlock?"
    corect: 4
    explicatie: "Toate cele 4 condiții (excludere mutuală, hold-and-wait, fără
      preempțiune, așteptare circulară) trebuie să fie prezente."

  # ===================== ÎNTREBĂRI NOI =====================

  # ---- Cursul 1: Introducere (kernel/user mode, apeluri sistem, întreruperi) ----
  - tip: grila
    dificultate: licenta
    enunt: "Prin ce mecanism trece procesorul din modul utilizator (user mode) în
      modul nucleu (kernel mode) pentru a executa un apel de sistem?"
    variante:
      - "Printr-o întrerupere software (trap), care comută în mod privilegiat"
      - "Prin schimbarea variabilelor de mediu"
      - "Printr-un apel obișnuit de funcție în spațiul utilizator"
      - "Prin repornirea procesorului"
    corect: 0
    explicatie: "Apelul de sistem este servit printr-o întrerupere software
      (trap/syscall, ex. INT 0x80 pe x86) care comută CPU în modul nucleu, unde
      codul SO are acces privilegiat."

  - tip: grila
    dificultate: licenta
    enunt: "Care este rolul principal al modului dual de execuție (user mode /
      kernel mode) într-un sistem de operare?"
    variante:
      - "Să permită rularea mai multor sisteme de operare simultan"
      - "Să reducă consumul de memorie"
      - "Să protejeze nucleul și resursele hardware de programele utilizator"
      - "Să accelereze accesul la disc"
    corect: 2
    explicatie: "Modul dual izolează codul utilizator de instrucțiunile
      privilegiate; doar nucleul (Ring 0) poate accesa direct hardware-ul,
      protejând sistemul."

  # ---- Cursul 2: Sistemul de fișiere (inode, descriptori, link-uri, permisiuni) ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce informații conține un inode într-un sistem de fișiere de tip Unix?"
    variante:
      - "Lista proceselor care au deschis fișierul"
      - "Metadatele fișierului (permisiuni, dimensiune, timestamp-uri, pointeri
        la blocuri), DAR nu numele"
      - "Doar numele și calea completă"
      - "Numele fișierului și conținutul lui"
    corect: 1
    explicatie: "Inode-ul stochează metadatele (tip, permisiuni, dimensiune,
      timestamp-uri, pointeri la blocuri). Numele fișierului este păstrat în
      intrarea de director, asociat cu numărul de inode."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența esențială între o legătură simbolică (symlink) și o
      legătură hard (hard link)?"
    variante:
      - "Legătura hard este o intrare suplimentară către același inode;
        symlink-ul este un fișier separat ce conține o cale"
      - "Nu există nicio diferență funcțională"
      - "Symlink-ul mărește contorul de legături al inode-ului, hard link-ul nu"
      - "Hard link-ul poate traversa sisteme de fișiere diferite, symlink-ul nu"
    corect: 0
    explicatie: "Hard link-ul partajează același inode (crește contorul de
      legături); symlink-ul este un fișier distinct care conține calea țintă și
      poate traversa sisteme de fișiere."

  - tip: grila
    dificultate: licenta
    enunt: "Ce reprezintă un descriptor de fișier (file descriptor) în Unix/Linux?"
    variante:
      - "Numărul de inode al fișierului"
      - "Un întreg nenegativ, index în tabela de fișiere deschise a procesului"
      - "O copie a conținutului fișierului în memorie"
      - "Numele complet al fișierului pe disc"
    corect: 1
    explicatie: "Descriptorul de fișier este un întreg nenegativ care indexează
      tabela descriptorilor deschiși ai procesului (0=stdin, 1=stdout,
      2=stderr)."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Ce descriptor de fișier are, prin convenție, ieșirea standard (stdout)?"
    corect: 1
    explicatie: "Prin convenție: 0 = stdin (intrarea standard), 1 = stdout (ieșirea
      standard), 2 = stderr (eroarea standard)."

  - tip: grila
    dificultate: licenta
    enunt: "Permisiunile unui fișier sunt rwxr-xr--. Ce drepturi are GRUPUL asupra
      fișierului?"
    variante:
      - "Doar citire"
      - "Citire, scriere și execuție"
      - "Niciun drept"
      - "Citire și execuție"
    corect: 3
    explicatie: "Cei 9 biți se citesc în 3 grupe: proprietar (rwx), grup (r-x),
      alții (r--). Grupul are deci citire și execuție, dar nu scriere."

  # ---- Cursul 3: Procese (stări, wait, PCB, COW) ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce devine un proces copil al cărui părinte se termină înaintea lui?"
    variante:
      - "Este terminat imediat de nucleu"
      - "Devine orfan și este adoptat de procesul init (PID 1)"
      - "Preia PID-ul părintelui"
      - "Devine zombie"
    corect: 1
    explicatie: "Un proces al cărui părinte s-a terminat devine orfan și este
      adoptat de init (PID 1), care îi va apela wait() pentru a evita acumularea
      de zombi."

  - tip: grila
    dificultate: licenta
    enunt: "Ce structură a nucleului păstrează contextul unui proces (PID, regiștri,
      stare, descriptori)?"
    variante:
      - "Stiva utilizator"
      - "Tabela de pagini"
      - "Tabela de inode-uri"
      - "Blocul de control al procesului (PCB / task_struct)"
    corect: 3
    explicatie: "PCB-ul (în Linux, struct task_struct) păstrează toate informațiile
      despre proces: PID, starea, regiștrii salvați, descriptorii de fișiere,
      info de planificare etc."

  - tip: grila
    dificultate: licenta
    enunt: "Ce optimizare folosește nucleul pentru ca fork() să nu copieze imediat
      tot spațiul de adrese al părintelui?"
    variante:
      - "Swapping"
      - "Copy-on-Write (COW): paginile sunt partajate read-only și duplicate
        doar la prima scriere"
      - "Compactarea memoriei"
      - "Demand paging exclusiv pentru stivă"
    corect: 1
    explicatie: "Prin Copy-on-Write, părintele și copilul partajează aceleași pagini
      marcate read-only; copierea unei pagini se face doar când unul dintre
      procese încearcă să o modifice (page fault)."

  - tip: grila
    dificultate: licenta
    enunt: "Care apel de sistem permite părintelui să aștepte terminarea unui copil
      și să-i preia codul de ieșire?"
    variante: [ "pipe()", "exec()", "wait()", "nice()" ]
    corect: 2
    explicatie: "wait() (apel blocant) suspendă părintele până când un copil se
      termină și îi recuperează exit status-ul; părintele este notificat prin
      semnalul SIGCHLD."

  # ---- Cursul 4: Planificarea execuției ----
  - tip: grila
    dificultate: licenta
    enunt: "Care algoritm de planificare alocă fiecărui proces o cuantă de timp
      fixă, ciclând prin coada de procese gata de execuție?"
    variante:
      - "SJF (Shortest Job First)"
      - "Planificare cu priorități statice"
      - "Round-Robin (RR)"
      - "FCFS (First Come First Served)"
    corect: 2
    explicatie: "Round-Robin acordă fiecărui proces o cuantă (time quantum) și, la
      expirarea ei, mută procesul la coada cozii — algoritm preemptiv potrivit
      pentru time-sharing."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este înfometarea (starvation) în contextul planificării proceselor?"
    variante:
      - "Un proces care nu primește niciodată CPU pentru că alte procese au
        prioritate mai mare"
      - "Un proces blocat în așteptarea unui semafor"
      - "Un proces care consumă toată memoria"
      - "Un proces terminat care a devenit zombie"
    corect: 0
    explicatie: "Starvation apare când un proces (de regulă cu prioritate mică) este
      amânat indefinit; soluția uzuală este aging-ul (creșterea treptată a
      priorității în timp)."

  - tip: grila
    dificultate: licenta
    enunt: "Care este principalul dezavantaj al unei cuante de timp PREA MICI în
      Round-Robin?"
    variante:
      - "Procesele lungi sunt înfometate"
      - "Crește timpul de răspuns al sistemului"
      - "Overhead-ul de comutare de context devine prea mare față de lucrul util"
      - "Sistemul devine nepreemptiv"
    corect: 2
    explicatie: "O cuantă prea mică duce la prea multe comutări de context, iar
      timpul petrecut cu salvarea/încărcarea contextului ajunge să domine timpul
      de calcul util."

  - tip: grila
    dificultate: licenta
    enunt: "Trei procese sosesc simultan, cu timpi de execuție de 24, 3 și 3 ms,
      planificate FCFS în această ordine. Cât este timpul mediu de turnaround?"
    variante: [ "30 ms", "10 ms", "24 ms", "27 ms" ]
    corect: 3
    explicatie: "Turnaround: P1=24, P2=27, P3=30; media = (24+27+30)/3 = 27 ms.
      Ordinea defavorabilă (procesul lung primul) ilustrează efectul de convoi
      al FCFS."

  # ---- Cursul 5: Gestiunea memoriei ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce este fragmentarea EXTERNĂ a memoriei?"
    variante:
      - "Suprapunerea a două procese în aceeași zonă de memorie"
      - "Pierderea datelor la swapping"
      - "Memorie liberă totală suficientă, dar împărțită în bucăți neadiacente
        prea mici"
      - "Spațiu pierdut în interiorul unei partiții alocate, mai mare decât
        nevoia"
    corect: 2
    explicatie: "Fragmentarea externă: există suficientă memorie liberă în total,
      dar fiind împrăștiată în blocuri mici neadiacente nu poate satisface o
      cerere mare. Fragmentarea internă este spațiul nefolosit din interiorul
      unei alocări."

  - tip: grila
    dificultate: licenta
    enunt: "Ce reprezintă operația de swapping?"
    variante:
      - "Înlocuirea unei pagini în TLB"
      - "Schimbarea priorității unui proces"
      - "Mutarea temporară a unui proces din memoria principală pe disc (backing
        store) și înapoi"
      - "Copierea spațiului de adrese la fork()"
    corect: 2
    explicatie: "Swapping-ul mută un proces (sau părți din el) din RAM pe disc
      pentru a elibera memorie, urmând să fie readus când are nevoie de CPU;
      este mult mai lent decât accesul la RAM."

  - tip: grila
    dificultate: licenta
    enunt: "Comparativ cu segmentarea, paginarea memoriei:"
    variante:
      - "Nu necesită tabelă de traducere a adreselor"
      - "Folosește segmente de dimensiune variabilă"
      - "Produce fragmentare externă, dar nicio fragmentare internă"
      - "Elimină fragmentarea externă, dar introduce fragmentare internă (în
        medie ~1/2 pagină per proces)"
    corect: 3
    explicatie: "Paginarea folosește pagini de dimensiune fixă, deci nu apare
      fragmentare externă; apare însă fragmentare internă, în medie jumătate de
      pagină per proces (ultima pagină parțial folosită)."

  # ---- Cursul 6: Memoria virtuală ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce este un page fault?"
    variante:
      - "Excepția generată când se accesează o pagină care nu se află în memoria
        fizică"
      - "O eroare de scriere pe disc"
      - "Terminarea anormală a unui proces"
      - "O coliziune în tabela de pagini"
    corect: 0
    explicatie: "Page fault apare când pagina referită nu este prezentă în RAM;
      nucleul o aduce de pe disc (demand paging) și reia instrucțiunea. Este un
      mecanism normal, spre deosebire de segmentation fault (acces ilegal)."

  - tip: grila
    dificultate: licenta
    enunt: "Care este rolul memoriei TLB (Translation Lookaside Buffer)?"
    variante:
      - "Păstrează lista paginilor libere"
      - "Conține codul nucleului"
      - "Stochează blocurile recent citite de pe disc"
      - "Este un cache hardware al traducerilor adresă virtuală -> adresă fizică"
    corect: 3
    explicatie: "TLB este un cache hardware rapid al intrărilor din tabela de
      pagini, accelerând translatarea adreselor virtuale în fizice și evitând al
      doilea acces la memorie pentru tabela de pagini."

  - tip: grila
    dificultate: licenta
    enunt: "Ce descrie fenomenul de thrashing în memoria virtuală?"
    variante:
      - "Sistemul petrece mai mult timp cu paginarea (swap in/out) decât cu
        execuția utilă"
      - "Două procese care accesează aceeași pagină"
      - "Pierderea de date din cauza unui crash"
      - "Fragmentarea tabelei de pagini"
    corect: 0
    explicatie: "Thrashing apare când prea multe procese concurează pe memorie
      insuficientă, generând page fault-uri continue; CPU-ul stă blocat în I/O
      de paginare în loc să facă muncă utilă."

  - tip: grila
    dificultate: licenta
    enunt: "Anomalia lui Belady afirmă că, la unele șiruri de referințe, mărirea
      numărului de cadre (frames) poate:"
    variante:
      - "Elimina complet page fault-urile"
      - "Reduce întotdeauna numărul de page fault-uri"
      - "Apărea doar la algoritmul LRU"
      - "Crește numărul de page fault-uri, în cazul algoritmului FIFO"
    corect: 3
    explicatie: "Anomalia Belady: la FIFO, creșterea numărului de cadre poate
      paradoxal să mărească numărul de page fault-uri. Algoritmii de tip stivă
      (ex. LRU, optimal) nu suferă de această anomalie."

  - tip: grila
    dificultate: licenta
    enunt: "Algoritmul de înlocuire a paginilor LRU (Least Recently Used) alege ca
      victimă pagina:"
    variante:
      - "Care va fi folosită cel mai târziu în viitor"
      - "Care nu a mai fost folosită de cel mai mult timp"
      - "Cu cel mai mic număr de inode"
      - "Adusă cel mai recent în memorie"
    corect: 1
    explicatie: "LRU evacuează pagina nefolosită de cel mai mult timp, pe baza
      localității temporale. Pagina folosită cel mai târziu în viitor ar fi
      aleasă de algoritmul optim (teoretic)."

  # ---- Cursul 7: Fire de execuție ----
  - tip: grila
    dificultate: licenta
    enunt: "Care este un avantaj al firelor (thread-urilor) față de procese?"
    variante:
      - "Costuri mai mici de creare și de comutare de context, plus partajare
        facilă a datelor"
      - "Imposibilitatea apariției race condition-urilor"
      - "Independența completă în caz de eroare"
      - "Izolare totală a memoriei între fire"
    corect: 0
    explicatie: "Firele unui proces partajează spațiul de adrese, deci crearea și
      comutarea sunt mai ieftine, iar partajarea datelor e directă. Dezavantajul
      este lipsa protecției și nevoia de sincronizare."

  - tip: grila
    dificultate: licenta
    enunt: "În modelul de threading many-to-one (fire la nivel utilizator), ce se
      întâmplă când un fir face un apel de sistem BLOCANT?"
    variante:
      - "Apelul este convertit automat în neblocant"
      - "Firul este mutat pe alt procesor"
      - "Se blochează întregul proces, deoarece nucleul nu vede firele
        individual"
      - "Doar firul respectiv se blochează, restul continuă"
    corect: 2
    explicatie: "La modelul many-to-one nucleul vede un singur fir; un apel blocant
      (sau un page fault) al unui fir blochează tot procesul, fiindcă
      planificarea firelor e făcută în spațiul utilizator."

  # ---- Cursul 8: Sincronizare ----
  - tip: grila
    dificultate: licenta
    enunt: "De ce operația i++ poate produce o condiție de cursă (race condition)
      când e executată concurent?"
    variante:
      - "Pentru că apelează planificatorul"
      - "Pentru că nu este atomică: se descompune în citire, incrementare și
        scriere"
      - "Pentru că modifică un fișier de pe disc"
      - "Pentru că folosește prea multă memorie"
    corect: 1
    explicatie: "i++ se compune din trei pași (citește valoarea, incrementează în
      registru, scrie înapoi); întreruperea între acești pași la fire concurente
      duce la pierderea unor incrementări."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența principală între un spinlock și un mutex când
      lock-ul este deja ocupat?"
    variante:
      - "Mutex-ul nu poate fi folosit pe multi-core"
      - "Spinlock-ul adoarme firul, mutex-ul face busy-waiting"
      - "Spinlock-ul face busy-waiting (ocupă CPU), mutex-ul blochează firul
        (sleep)"
      - "Ambele fac busy-waiting identic"
    corect: 2
    explicatie: "Spinlock-ul așteaptă activ (busy-waiting), consumând CPU — potrivit
      pentru secțiuni critice scurte. Mutex-ul pune firul în starea blocat
      (sleep), fiind potrivit pentru secțiuni critice mari."

  - tip: grila
    dificultate: licenta
    enunt: "Ce garantează o operație de tip Compare-and-Swap (CAS)?"
    variante:
      - "Schimbarea priorității unui fir"
      - "Copierea atomică a unui întreg bloc de memorie"
      - "Verificarea și actualizarea atomică a unei valori într-un singur pas
        indivizibil"
      - "Crearea unei bariere de sincronizare"
    corect: 2
    explicatie: "CAS (compare-and-swap / cmpxchg) compară o variabilă cu o valoare
      așteptată și, dacă se potrivește, o actualizează — totul atomic; este baza
      spinlock-urilor și a prevenirii TOCTOU."

  - tip: grila
    dificultate: licenta
    enunt: "Ce fac operațiile P (wait) și V (signal) asupra unui semafor?"
    variante:
      - "P incrementează, V decrementează semaforul"
      - "P creează semaforul, V îl distruge"
      - "Ambele incrementează semaforul"
      - "P decrementează (blocant la 0), V incrementează semaforul"
    corect: 3
    explicatie: "P (wait) decrementează semaforul, blocând firul dacă valoarea ar
      deveni negativă; V (signal) incrementează semaforul, eventual deblocând un
      fir care aștepta. Valoarea nu scade sub 0."

  - tip: grila
    dificultate: licenta
    enunt: "Cum se sincronizează un grup de fire cu o barieră (barrier)?"
    variante:
      - "Doar primul fir poate trece"
      - "Fiecare fir trece imediat, fără să aștepte"
      - "Firele sunt terminate când ajung la barieră"
      - "Niciun fir nu trece de barieră până când TOATE firele nu ajung în acel
        punct"
    corect: 3
    explicatie: "Bariera oprește fiecare fir ajuns în punctul de sincronizare; abia
      când ultimul fir ajunge, toate firele sunt eliberate simultan să
      continue."

  - tip: grila
    dificultate: licenta
    enunt: "De ce așteptarea pe o variabilă de condiție (pthread_cond_wait) se face
      de regulă într-o buclă while, nu într-un if?"
    variante:
      - "Pentru a evita crearea de fire suplimentare"
      - "Pentru a re-verifica predicatul după trezire (trezirile spurioase /
        starea se poate schimba)"
      - "Pentru că if-ul nu funcționează cu mutex-uri"
      - "Pentru a apela funcția de mai multe ori, mai rapid"
    corect: 1
    explicatie: "După trezire, condiția poate să nu mai fie adevărată (alt fir a
      consumat resursa) sau pot apărea treziri spurioase; bucla while
      re-evaluează predicatul înainte de a continua."

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Sub ce valoare minimă NU poate scădea valoarea unui semafor (în
      convenția standard)?"
    corect: 0
    explicatie: "Valoarea unui semafor nu poate scădea sub 0; la 0 operația de
      decrementare (P/wait) se blochează până când semaforul devine strict
      pozitiv."

  # ---- Întrebări numerice de estimare ----
  - tip: numeric_aprox
    dificultate: licenta
    enunt: "În ce an a apărut prima versiune a nucleului Linux (anunțată de Linus
      Torvalds)?"
    corect: 1991
    explicatie: "Linus Torvalds a anunțat și lansat prima versiune a nucleului Linux
      în 1991."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Care este dimensiunea tipică (uzuală) a unei pagini de memorie pe
      arhitecturile x86, în KiB?"
    corect: 4
    explicatie: "Dimensiunea standard a paginii pe x86/x86-64 este 4 KiB (4096
      octeți), corespunzând unui offset pe 12 biți; există și pagini mari (huge
      pages) de 2 MiB sau 1 GiB."

  # ============================================================
  #  ÎNTREBĂRI NOI (set 2) — ancorate pe cursurile PSO-NOI
  # ============================================================

  # ---- numeric_aprox (DEPARTAJARE — estimări, cine se apropie câștigă) ----
  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Aproximativ câți biți de offset (deplasament în interiorul paginii) are
      o adresă pentru o pagină de 4 KiB?"
    corect: 12
    explicatie: "O pagină de 4 KiB = 4096 = 2^12 octeți, deci offset-ul ocupă 12
      biți; restul biților adresei selectează numărul paginii."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte intrări (entries) are, ca ordin de mărime tipic, un TLB modern de
      nivel 1 pentru pagini de date?"
    corect: 64
    explicatie: "Un TLB de nivel 1 are tipic câteva zeci de intrări (frecvent ~64);
      fiind un cache hardware scump și foarte rapid, capacitatea lui este mică,
      motiv pentru care există și un TLB de nivel 2 mai mare."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "În jurul cărui an au apărut sistemele Unix la Bell Labs (prima versiune)?"
    corect: 1969
    explicatie: "Unix a fost dezvoltat la Bell Labs în jurul anului 1969-1970 de Ken
      Thompson și Dennis Ritchie; este strămoșul familiei de SO de tip Unix
      (Linux, BSD, macOS)."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Conform recomandării clasice, de câte ori dimensiunea memoriei RAM ar
      trebui să fie partiția de swap?"
    corect: 2
    explicatie: "Regula clasică spune swap = 2 * RAM; partiția de swap (backing
      store) extinde spațiul de memorie folosibil, dar accesul este mult mai
      lent decât la RAM."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Pe ce dimensiune (în GiB) este, clasic, separat spațiul de adrese
      virtual al unui proces pe x86 pe 32 de biți între user-space și
      kernel-space (partea de user)?"
    corect: 3
    explicatie: "Pe x86 pe 32 de biți, spațiul virtual de 4 GiB este împărțit clasic
      3 GiB user-space + 1 GiB kernel-space (TASK_SIZE = 0xc0000000)."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Care este, ca ordin de mărime, dimensiunea uzuală (în MiB) a stivei
      principale a unui proces în Linux (RLIMIT_STACK implicit)?"
    corect: 8
    explicatie: "Limita implicită a stivei (RLIMIT_STACK) în Linux este tipic 8 MiB;
      stiva crește de la adrese mari spre adrese mici."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "În jurul cărui procent de utilizare a CPU se situează, în practică, un
      sistem încărcat (limita superioară uzuală menționată la curs)?"
    corect: 90
    explicatie: "La curs se menționează că utilizarea CPU variază teoretic 0-100%,
      dar în practică se situează în intervalul 40-90%."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câți octeți are o adresă pe o arhitectură pe 64 de biți?"
    corect: 8
    explicatie: "O adresă pe 64 de biți ocupă 64 / 8 = 8 octeți; în practică doar o
      parte din cei 64 de biți sunt folosiți efectiv pentru adresare (ex. 48
      biți)."

  # ---- grila cu SCHEMĂ (cod) — întrebări mai grele, timp: 50 ----
  - tip: grila
    dificultate: licenta
    enunt: "În diagrama de stări a unui proces de mai jos, ce tranziție corespunde
      etichetei 'scheduler dispatch'?"
    cod: |
      [new] --admitted--> [ready] --dispatch--> [running] --exit--> [terminated]
                             ^                       |
                             +--I/O completion-- [waiting] <--I/O wait--+
    timp: 50
    variante:
      - "Trecerea procesului din RUNNING in WAITING"
      - "Trecerea procesului din READY in RUNNING"
      - "Trecerea procesului din RUNNING in TERMINATED"
      - "Trecerea procesului din NEW in READY"
    corect: 1
    explicatie: "scheduler dispatch este momentul in care planificatorul alege un
      proces din coada READY si il pune sa ruleze pe procesor (READY ->
      RUNNING). Tranzitia inversa (RUNNING -> READY) este declansata de o
      intrerupere (interrupt), de exemplu expirarea cuantei."

  - tip: grila
    dificultate: licenta
    enunt: "În layout-ul de memorie virtuală al unui proces de mai jos, în ce zonă
      este alocată memoria dinamică obținută cu malloc()?"
    cod: |
      adrese mari
        +----------------------+  kernel space
        +----------------------+
        |        stack         |  (creste in jos)
        |          |           |
        |          v           |
        +----------------------+
        |   memory mapping     |  (libc.so etc.)
        +----------------------+
        |          ^           |
        |          |           |
        |         heap         |  (creste in sus)
        +----------------------+
        |  bss / data / text   |
        +----------------------+
      adrese mici (0)
    timp: 50
    variante: [ "heap", "bss", "text", "stack" ]
    corect: 0
    explicatie: "malloc()/new alocă memorie dinamică pe heap, care creste de la
      adrese mici spre adrese mari (program break / brk). Stiva crește invers,
      de sus în jos; text/data/bss au dimensiune stabilită la încărcare."

  - tip: grila
    dificultate: licenta
    enunt: "Privind secțiunea de cod de mai jos executată după fork(), ce ramură
      execută PROCESUL COPIL?"
    cod: |
      pid = fork();
      if (pid < 0)        { /* ramura A */ }
      else if (pid == 0)  { /* ramura B */ }
      else                { /* ramura C */ }
    timp: 50
    variante:
      - "Ramura A (pid < 0)"
      - "Nicio ramură, copilul nu execută acest cod"
      - "Ramura B (pid == 0)"
      - "Ramura C (else)"
    corect: 2
    explicatie: "În copil fork() întoarce 0, deci se execută ramura B. În părinte
      întoarce PID-ul copilului (>0, ramura C), iar la eroare întoarce -1
      (ramura A). Copilul moștenește codul părintelui și continuă din același
      punct."

  - tip: grila
    dificultate: licenta
    enunt: "Privind secvența de mai jos, care este efectul tipic al combinației
      fork() + exec()?"
    cod: |
      pid = fork();          // se creeaza un proces copil (duplicat)
      if (pid == 0) {
          execv("/bin/ls", argv);   // in copil
      }
      wait(NULL);            // in parinte
    timp: 50
    variante:
      - "Atât părintele, cât și copilul ajung să ruleze /bin/ls"
      - "Copilul devine un proces nou care rulează /bin/ls, iar părintele
        așteaptă terminarea lui"
      - "wait() este apelat de copil, nu de părinte"
      - "exec() creează un al treilea proces"
    corect: 1
    explicatie: "fork() creează copilul (duplicat al părintelui); în copil exec()
      înlocuiește imaginea cu /bin/ls (păstrând PID-ul), iar părintele apelează
      wait() ca să aștepte terminarea copilului. Acesta este modelul standard de
      lansare a unui program nou în Unix."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru tabelul de planificare FCFS de mai jos (procese sosite la t=0 în
      ordinea P1, P2, P3), cât este timpul mediu de AȘTEPTARE?"
    cod: |
      Proces | Sosire | Durata (burst)
      -------+--------+---------------
        P1   |   0    |     6 ms
        P2   |   0    |     8 ms
        P3   |   0    |     4 ms
      Ordine FCFS:  | P1 | P2 | P3 |
                    0    6    14   18
    timp: 50
    variante: [ "20 ms", "8 ms", "12 ms", "6 ms" ]
    corect: 3
    explicatie: "Timpii de așteptare: P1=0, P2=6, P3=14. Media = (0+6+14)/3 = 20/3 ≈
      6,67 ms, deci cel mai apropiat răspuns este 6 ms. FCFS este nepreemptiv și
      servește procesele în ordinea sosirii."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru cele două procese de mai jos planificate Round-Robin cu cuanta q
      = 4 ms, în ce ordine ocupă procesorul primele 3 cuante?"
    cod: |
      Proces | Durata
      -------+-------
        P1   |  8 ms
        P2   |  4 ms
      RR, q = 4 ms:
        slot1   slot2   slot3
        [ ? ]   [ ? ]   [ ? ]
    timp: 50
    variante:
      - "P1, P1, P2"
      - "P2, P1, P2"
      - "P1, P2, P2"
      - "P1, P2, P1"
    corect: 3
    explicatie: "Round-Robin acordă fiecărui proces o cuantă pe rând: slot1 = P1
      (rămâne 4 ms), slot2 = P2 (se termină), slot3 = P1 (se termină). Deci
      ordinea cuantelor este P1, P2, P1."

  # ---- grila normale, concepte cheie neacoperite ----
  - tip: grila
    dificultate: licenta
    enunt: "Ce rol are unitatea MMU (Memory Management Unit) într-un sistem cu
      memorie virtuală?"
    variante:
      - "Stochează codul nucleului"
      - "Gestionează tabela de descriptori de fișiere"
      - "Planifică procesele pe procesoare"
      - "Traduce adresele logice (virtuale) în adrese fizice la run-time"
    corect: 3
    explicatie: "MMU este componenta hardware care mapează adresele virtuale
      generate de CPU în adrese fizice la momentul execuției, folosind tabela de
      pagini (accelerată de TLB); programele din user-space lucrează doar cu
      adrese virtuale."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența dintre planificarea cooperativă și cea preemptivă?"
    variante:
      - "În cea cooperativă procesul cedează voluntar CPU; în cea preemptivă
        nucleul îl poate întrerupe forțat (ex. la expirarea cuantei)"
      - "Cea cooperativă necesită întotdeauna întreruperi de ceas"
      - "Cea preemptivă nu permite mai multe procese simultan"
      - "Nu există nicio diferență practică"
    corect: 0
    explicatie: "În planificarea cooperativă procesul deține CPU până când cedează
      voluntar (yield) sau se blochează; în cea preemptivă planificatorul îl
      poate lua forțat (de regulă la întreruperea de ceas / expirarea cuantei
      sau la apariția unui proces mai prioritar)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este timpul de turnaround (turnaround time) al unui proces?"
    variante:
      - "Timpul total de la intrarea în sistem până la ieșirea (terminarea) lui"
      - "Timpul petrecut doar în coada READY"
      - "Durata unei singure cuante de timp"
      - "Timpul de la intrarea în sistem până la prima instrucțiune executată"
    corect: 0
    explicatie: "Turnaround time = momentul terminării − momentul sosirii, adică
      durata totală petrecută în sistem (așteptare + execuție). Timpul până la
      prima instrucțiune este response time, iar timpul în coada READY este
      timpul de așteptare."

  - tip: grila
    dificultate: licenta
    enunt: "Prin ce apel de sistem din Linux sunt implementate efectiv fork(),
      vfork() și pthread_create() (la nivel de nucleu)?"
    variante: [ "kill()", "exec()", "wait()", "clone()" ]
    corect: 3
    explicatie: "În Linux, fork(), vfork() și crearea de fire sunt implementate
      peste apelul de sistem clone() (care apelează do_fork() / copy_process());
      ce se copiază sau se partajează între părinte și copil depinde de
      flag-urile transmise lui clone()."
