      generate de CPU în adrese fizice la momentul execuției, folosind tabela de
      pagini (accelerată de TLB); programele din user-space lucrează doar cu
      adrese virtuale."

  - tip: grila
    dificultate: licenta
    enunt: "Care este diferența dintre planificarea cooperativă și cea preemptivă?"
    variante:
      - "În cea cooperativă procesul cedează voluntar CPU; în cea preemptivă
        nucleul îl poate întrerupe forțat (ex. la expirarea cuantei)"
      - "Cea preemptivă nu permite mai multe procese simultan"
      - "Nu există nicio diferență practică"
      - "Cea cooperativă necesită întotdeauna întreruperi de ceas"
    corect: 0
    explicatie: "În planificarea cooperativă procesul deține CPU până când cedează
      voluntar (yield) sau se blochează; în cea preemptivă planificatorul îl
      poate lua forțat (de regulă la întreruperea de ceas / expirarea cuantei
      sau la apariția unui proces mai prioritar)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce este timpul de turnaround (turnaround time) al unui proces?"
    variante:
      - "Timpul total de la intrarea în sistem până la ieșirea (terminarea) lui"
      - "Durata unei singure cuante de timp"
      - "Timpul petrecut doar în coada READY"
      - "Timpul de la intrarea în sistem până la prima instrucțiune executată"
    corect: 0
    explicatie: "Turnaround time = momentul terminării − momentul sosirii, adică
      durata totală petrecută în sistem (așteptare + execuție). Timpul până la
      prima instrucțiune este response time, iar timpul în coada READY este
      timpul de așteptare."

  - tip: grila
    dificultate: licenta
    enunt: "Prin ce apel de sistem din Linux sunt implementate efectiv fork(),
      vfork() și pthread_create() (la nivel de nucleu)?"
    variante: [ "wait()", "exec()", "kill()", "clone()" ]
    corect: 3
    explicatie: "În Linux, fork(), vfork() și crearea de fire sunt implementate
      peste apelul de sistem clone() (care apelează do_fork() / copy_process());
      ce se copiază sau se partajează între părinte și copil depinde de
      flag-urile transmise lui clone()."

  # ============================================================
  #  ÎNTREBĂRI NOI (set 3) — extrase din banca de examen ATM
  #  (probleme reale fork/exec, memorie, semafoare, planificare)
  # ============================================================

  - tip: numeric_exact
    dificultate: licenta
    enunt: "Câte procese COPIL rezultă din bucla de mai jos, în care FIECARE proces
      (părinte și copii) apelează fork() la fiecare iterație (fără gardă
      if(pid>0))?"
    cod: |
      for (i = 0; i < 3; i++) {
          pid = fork();   // fara if(pid > 0)
      }
    timp: 50
    corect: 7
    explicatie: "Numărul total de procese se dublează la fiecare iterație: 1 -> 2 ->
      4 -> 8. La final există 2^3 = 8 procese, deci 7 copii. Cu o gardă
      if(pid>0) numai părintele ar forka și ar rezulta exact 3 copii."

  - tip: grila
    dificultate: licenta
    enunt: "Câte procese există în TOTAL (inclusiv procesul inițial) după execuția
      buclei de mai jos, în care copilul face exit(1) imediat?"
    cod: |
      for (i = 0; i < 3; i++) {
          if (fork() == 0) {
              i = i + 2;
              printf("copil i=%d\n", i);
              exit(1);          // copilul iese imediat
          } else {
              wait(NULL);
              printf("parinte i=%d\n", i);
          }
      }
    timp: 50
    variante: [ "8", "6", "2", "4" ]
    corect: 3
    explicatie: "Doar părintele rulează bucla complet: la fiecare din cele 3
      iterații creează un copil care face exit(1) imediat (deci nu mai
      forkează). Total = 1 părinte + 3 copii = 4 procese."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru codul de mai jos, copilul modifică i în propria copie de memorie
      (COW), iar wait(NULL) forțează copilul să afișeze primul. Ce valori se
      tipăresc?"
    cod: |
      for (i = 0; i < 3; i++) {
          if (fork() == 0) {
              i = i + 2;
              printf("copil i=%d   ", i);
              exit(1);
          } else {
              wait(NULL);
              printf("parinte i=%d\n", i);
          }
      }
    timp: 50
    variante:
      - "copil i=2 parinte i=0 / copil i=3 parinte i=0 / copil i=4 parinte i=0"
      - "copil i=2 parinte i=1 / copil i=2 parinte i=2 / copil i=2 parinte i=3"
      - "copil i=2 parinte i=2 / copil i=3 parinte i=3 / copil i=4 parinte i=4"
      - "copil i=2 parinte i=0 / copil i=3 parinte i=1 / copil i=4 parinte i=2"
    corect: 3
    explicatie: "Copilul face i=i+2 în copia lui de memorie, deci afișează 2, 3, 4
      (pentru i=0,1,2). Părintele NU este afectat de modificare și păstrează i =
      0, 1, 2. wait(NULL) face ca, la fiecare iterație, copilul să termine
      înaintea afișării părintelui."

  - tip: grila
    dificultate: licenta
    enunt: "Un copil face sleep(10), iar părintele se termină imediat după fork().
      Ce valoare returnează getppid() apelat în copil DUPĂ sleep?"
    timp: 50
    variante:
      - "0"
      - "PID-ul (acum invalid) al părintelui care a murit"
      - "1 (procesul init / systemd, care adoptă orfanul)"
      - "-1, deoarece copilul a devenit zombie"
    corect: 2
    explicatie: "Părintele murind în timpul sleep, copilul rămâne orfan și este
      adoptat de init (PID 1). getppid() întoarce deci 1. Copilul NU este
      zombie: zombie ar fi fost dacă el s-ar fi terminat primul, fără ca
      părintele să facă wait()."

  - tip: grila
    dificultate: licenta
    enunt: "Ce se întâmplă când un SINGUR fir dintr-un proces multi-thread apelează
      exit() (nu pthread_exit())?"
    timp: 50
    variante:
      - "Se creează un proces zombie pentru fiecare fir"
      - "Se termină TOATE firele procesului (efect per proces)"
      - "Se termină doar firul respectiv, celelalte continuă"
      - "Firul este convertit într-un proces separat"
    corect: 1
    explicatie: "exit() are efect la nivel de PROCES: termină întreg procesul,
      inclusiv toate firele lui. Pentru a încheia doar firul curent, lăsând
