  # ---------- EX4: complexitate triplă buclă ----------
  - tip: grila
    dificultate: licenta
    enunt: "Ce complexitate are fragmentul de mai jos? Atenție la capcana cu j*=2."
    cod: |
      int s=0;
      for (int i=n; i>0; i--)
        for (int j=1; j<n; j*=2)
          for (int k=0; k<j; k++)
            s++;
    timp: 70
    variante: [ "Θ(n log² n)", "Θ(n)", "Θ(n log n)", "Θ(n²)" ]
    corect: 3
    explicatie: "Cele două bucle interioare: j ia 1,2,4,...<n, iar k rulează de j
      ori, deci suma 1+2+4+... este o serie geometrică ≈ 2n → Θ(n). Bucla pe i
      rulează de n ori. Total: Θ(n) × n = Θ(n²)."

