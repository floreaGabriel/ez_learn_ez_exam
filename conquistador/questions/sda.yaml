  # ---------- numeric_aprox (departajare) ----------
  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Aproximativ câte operații elementare execută bucla dublă imbricată
      dependentă for i=0..n-1, for j=i..n-1, pentru n = 100? (≈ n^2/2)"
    corect: 5050
    explicatie: "Numărul de perechi (i,j) cu i <= j este n*(n+1)/2 = 100*101/2 =
      5050, adică aproximativ n^2/2."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Aproximativ câte comparații face Merge Sort pentru n = 1024, estimând
      prin n*log2(n)? (log2 de 1024 este 10)"
    corect: 10240
    explicatie: "n*log2(n) = 1024 * 10 = 10240 de comparații aproximativ."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Care este înălțimea (numărul de muchii pe cea mai lungă ramură) a unui
      arbore binar complet echilibrat cu 1023 de noduri? (≈ log2(n+1) - 1)"
    corect: 9
    explicatie: "Un arbore binar complet cu 1023 = 2^10 - 1 noduri are 10 niveluri,
      deci înălțimea în muchii este 9."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte muchii are un graf neorientat complet cu 20 de noduri? (n*(n-1)/2)"
    corect: 190
    explicatie: "Un graf complet cu n noduri are n*(n-1)/2 muchii; pentru n=20
      rezultă 20*19/2 = 190."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Aproximativ câte apeluri recursive (noduri în arborele de recursivitate)
      generează calculul lui Fibonacci recursiv naiv pentru F(10)? (≈ 2*F(n)-1)"
    corect: 177
    explicatie: "Numărul de apeluri pentru F(n) recursiv naiv este 2*F(n)-1;
      F(10)=89, deci 2*89-1 = 177 de apeluri."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte noduri (interne și frunze) are un arbore binar perfect cu înălțimea
      h = 5 (măsurată în muchii)? (2^(h+1) - 1)"
    corect: 63
    explicatie: "Un arbore binar perfect de înălțime h are 2^(h+1)-1 noduri; pentru
      h=5 rezultă 2^6 - 1 = 63 de noduri."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte interschimbări (swap) face Selection Sort, aproximativ, pentru un
      vector cu n = 50 de elemente? (≈ n-1 interschimbări)"
    corect: 49
    explicatie: "Selection Sort face cel mult o interschimbare per pas, deci n-1 =
      49 de interschimbări (deși numărul de comparații este ~n^2/2)."

  - tip: numeric_aprox
    dificultate: licenta
    enunt: "Câte comparații, aproximativ, face construirea unui heap (build-heap) cu
      n = 1.000.000 de elemente, știind că build-heap este O(n)?"
    corect: 1000000
    explicatie: "Construirea unui heap prin heapify de jos în sus are complexitate
      liniară O(n), deci aproximativ n = 1.000.000 de operații, nu n*log n."

  # ---------- grila cu cod/pseudocod ----------
  - tip: grila
    dificultate: licenta
    enunt: "Ce complexitate are funcția de mai jos?"
    cod: |
      for (i = 0; i < n; i++)
        for (j = i; j < n; j++)
          suma += a[i] * a[j];
    timp: 50
    variante: [ "O(2^n)", "O(n)", "O(n^2)", "O(n log n)" ]
    corect: 2
    explicatie: "Două bucle imbricate dependente execută ~n^2/2 iterații, deci
      complexitatea este O(n^2)."

  - tip: grila
    dificultate: licenta
    enunt: "Ce complexitate are bucla de mai jos, în care indicele se dublează la
      fiecare pas?"
    cod: |
      i = 1;
      while (i < n) {
        proceseaza(i);
        i = i * 2;
      }
    timp: 50
    variante: [ "O(n^2)", "O(log n)", "O(n)", "O(1)" ]
    corect: 1
    explicatie: "Indicele i ia valorile 1, 2, 4, 8, ... până depășește n, deci bucla
      se execută de aproximativ log2(n) ori: O(log n)."

  - tip: grila
    dificultate: licenta
    enunt: "Se inserează în ordine cheile 50, 30, 70, 20, 40 într-un arbore binar de
      căutare inițial vid. Care nod ajunge rădăcină și care este structura?"
    cod: |
      BST.insert(50)
      BST.insert(30)
      BST.insert(70)
      BST.insert(20)
      BST.insert(40)
    timp: 50
    variante:
      - "Rădăcina 50, cu 30 (și fiii 20, 40) în stânga și 70 în dreapta"
      - "Rădăcina 50, cu 70 în stânga și 30 în dreapta"
      - "Rădăcina 30, cu 20 și 50 ca fii"
      - "Rădăcina 20, arborele este o listă degenerată"
    corect: 0
    explicatie: "Prima cheie inserată (50) devine rădăcină; 30<50 merge stânga,
      70>50 dreapta, 20<30 stânga lui 30, 40>30 dreapta lui 30. Rezultă un
      arbore echilibrat cu rădăcina 50."

  - tip: grila
    dificultate: licenta
    enunt: "Se inserează succesiv cheile de mai jos într-un max-heap (reprezentat ca
      vector). Ce valoare se află în rădăcină (v[0]) la final?"
    cod: |
      maxheap.insert(10)
      maxheap.insert(20)
      maxheap.insert(5)
      maxheap.insert(30)
    timp: 50
    variante: [ "10", "5", "30", "20" ]
    corect: 2
    explicatie: "La inserarea lui 30 acesta urcă prin heapify_up până în rădăcină,
      fiind valoarea maximă; într-un max-heap maximul este mereu în v[0]."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru arborele binar de mai jos, care este rezultatul parcurgerii în
      lățime (BFS, pe niveluri)?"
    cod: |
      Nivel 0:            100
      Nivel 1:        19      36
      Nivel 2:     17   3   25   1
      Nivel 3:   2   7
      (17 are fiii 2 si 7; restul frunzelor nu au copii)
    timp: 50
    variante:
      - "2, 7, 17, 3, 19, 25, 1, 36, 100"
      - "100, 19, 36, 17, 3, 25, 1, 2, 7"
      - "100, 19, 17, 2, 7, 3, 36, 25, 1"
      - "2, 17, 7, 19, 3, 100, 25, 36, 1"
    corect: 1
    explicatie: "BFS vizitează nodurile nivel cu nivel, de la stânga la dreapta: 100
      | 19, 36 | 17, 3, 25, 1 | 2, 7."

  - tip: grila
    dificultate: licenta
    enunt: "Pentru același arbore, care este rezultatul parcurgerii în adâncime în
      preordine (RSD: Rădăcină-Stânga-Dreapta)?"
    cod: |
      Nivel 0:            100
      Nivel 1:        19      36
      Nivel 2:     17   3   25   1
      Nivel 3:   2   7
      (17 are fiii 2 si 7; restul frunzelor nu au copii)
    timp: 50
    variante:
      - "100, 19, 36, 17, 3, 25, 1, 2, 7"
      - "2, 7, 17, 3, 19, 25, 1, 36, 100"
      - "2, 17, 7, 19, 3, 100, 25, 36, 1"
      - "100, 19, 17, 2, 7, 3, 36, 25, 1"
    corect: 3
    explicatie: "Preordinea vizitează întâi rădăcina, apoi recursiv subarborele
      stâng și apoi cel drept: 100, 19, 17, 2, 7, 3, 36, 25, 1."

  - tip: grila
    dificultate: licenta
    enunt: "Ce afișează (ce returnează) fragmentul de mai jos pentru un BST cu
      cheile 8, 3, 10, 1, 6, 14, 4, 7, 13?"
    cod: |
      void inordine(nod* p) {
        if (p == NULL) return;
        inordine(p->left);
        printf("%d ", p->val);
        inordine(p->right);
      }
    timp: 50
    variante:
      - "8 3 10 1 6 14 4 7 13"
      - "8 3 1 6 4 7 10 14 13"
      - "1 4 7 6 3 13 14 10 8"
      - "1 3 4 6 7 8 10 13 14"
    corect: 3
    explicatie: "Parcurgerea inordine (Stânga-Rădăcină-Dreapta) a unui BST produce
      cheile în ordine crescătoare: 1 3 4 6 7 8 10 13 14."

  - tip: grila
    dificultate: licenta
    enunt: "Ce complexitate are funcția recursivă de mai jos, în funcție de n?"
    cod: |
      int f(int n) {
        if (n <= 1) return 1;
        return f(n - 1) + f(n - 1);
      }
    timp: 50
    variante: [ "O(n)", "O(n^2)", "O(n log n)", "O(2^n)" ]
    corect: 3
    explicatie: "Fiecare apel generează două apeluri pe n-1, deci numărul de apeluri
      se dublează la fiecare nivel: T(n) = 2*T(n-1) => O(2^n)."

  # ---------- grila normale neacoperite ----------
  - tip: grila
    dificultate: licenta
    enunt: "Parcurgerea în adâncime (DFS) a unui graf folosește în mod natural ca
      structură auxiliară (sau recursivitatea, care folosește implicit):"
    variante: [ "O coadă", "O stivă", "O tabelă hash", "Un heap" ]
    corect: 1
    explicatie: "DFS folosește o stivă (LIFO) — explicit sau implicit prin stiva de
      apeluri a recursivității; BFS, în schimb, folosește o coadă."

  - tip: grila
    dificultate: licenta
    enunt: "Ce structură de date este cea mai potrivită pentru a implementa eficient
      o coadă de priorități (priority queue)?"
    variante: [ "Tabelă hash", "Trie", "Listă simplu înlănțuită neordonată", "Heap binar" ]
    corect: 3
    explicatie: "Heap-ul binar oferă inserare și extragere a extremului în O(log n),
      fiind implementarea uzuală a unei cozi de priorități."

  - tip: grila
    dificultate: licenta
    enunt: "Un algoritm de sortare este numit stabil dacă:"
    variante:
      - "Păstrează ordinea relativă a elementelor cu chei egale"
      - "Sortează mereu crescător"
      - "Are complexitate O(n log n) în toate cazurile"
      - "Nu folosește memorie suplimentară"
    corect: 0
    explicatie: "Un algoritm stabil păstrează ordinea relativă inițială a
