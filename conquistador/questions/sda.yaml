  # ---------- EX1: BST countBetween ----------
  - tip: grila
    dificultate: licenta
    enunt: "Funcția de mai jos numără nodurile unui BST cu valori în [min, max].
      Care este complexitatea ei, unde h = înălțimea, iar k = numărul de noduri
      din interval?"
    cod: |
      int countBetween(Node* r, int min, int max) {
        if (r == NULL) return 0;
        if (r->val < min)                 // prea mic -> doar dreapta
          return countBetween(r->right, min, max);
        if (r->val > max)                 // prea mare -> doar stanga
          return countBetween(r->left, min, max);
        return 1 + countBetween(r->left,  min, max)
                 + countBetween(r->right, min, max);
      }
    timp: 50
    variante: [ "O(k * h)", "O(h + k)", "O(log n)", "O(n)" ]
    corect: 1
    explicatie: "Proprietatea BST permite tăierea subarborilor complet în afara
      intervalului: se coboară pe înălțime (h) plus se vizitează cele k noduri
      din interval, deci O(h + k)."

  - tip: grila
    dificultate: licenta
    enunt: "În funcția countBetween de mai sus, de ce nu se coboară în subarborele
      stâng atunci când valoarea nodului curent este strict mai mică decât min?"
    cod: |
      if (r->val < min)
        return countBetween(r->right, min, max);
    timp: 50
    variante:
      - "Pentru că subarborele stâng conține doar valori și mai mici decât
        nodul, deci tot sub min"
      - "Pentru că subarborele stâng conține valori mai mari decât max"
      - "Pentru că subarborele stâng este întotdeauna vid"
      - "Pentru că s-ar produce o buclă infinită"
    corect: 0
    explicatie: "Într-un BST, toate valorile din subarborele stâng sunt mai mici
      decât nodul curent; dacă nodul deja e sub min, întreg subarborele stâng e
      prea mic și se ignoră, mergând doar la dreapta."

