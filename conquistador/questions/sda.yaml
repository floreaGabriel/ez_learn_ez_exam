  - tip: grila
    dificultate: licenta
    enunt: "Care dintre următoarele afirmații despre Quick Sort este corectă?"
    variante:
      - "Folosește interclasarea (merge) a două jumătăți sortate"
      - "Sortează in-place și are complexitate medie O(n log n)"
      - "Necesită întotdeauna memorie suplimentară O(n)"
      - "Are întotdeauna complexitate O(n log n), inclusiv în cazul cel mai
        defavorabil"
    corect: 1
    explicatie: "Quick Sort sortează in-place (memorie suplimentară O(log n) pentru
