  - tip: grila
    dificultate: licenta
    enunt: "Cum se poate sorta un vector de întregi FĂRĂ a folosi vreo operație de
      comparație între elemente, și ce complexitate are metoda?"
    cod: |
      // valori in [0, k]
      int cnt[k+1] = {0};
      for (int i=0;i<n;i++) cnt[a[i]]++;   // numara aparitiile
      int idx=0;
      for (int v=0;v<=k;v++)
        while (cnt[v]--) a[idx++]=v;        // reconstruieste sortat
    timp: 60
    variante:
      - "Merge Sort, în O(n log n)"
      - "Counting Sort, folosind valoarea ca indice, în O(n + k)"
      - "Heap Sort, în O(n log n)"
      - "Quick Sort, în O(n log n)"
    corect: 1
    explicatie: "Counting Sort folosește valoarea ca indice într-un vector de
      frecvențe, fără nicio comparație între elemente; complexitatea este O(n +
      k), unde k e domeniul valorilor."

  - tip: grila
    dificultate: licenta
    enunt: "Radix Sort sortează numere mari fără comparații. Pe ce se bazează și
      care este complexitatea sa pentru d cifre?"
    timp: 50
    variante:
      - "Compară numerele cifră cu cifră, în O(n²)"
      - "Aplică Quick Sort pe fiecare cifră, în O(d·n log n)"
      - "Aplică Counting Sort succesiv pe fiecare cifră, în O(d·(n + k))"
      - "Folosește un heap pentru fiecare cifră, în O(n log n)"
    corect: 2
    explicatie: "Radix Sort aplică Counting Sort stabil succesiv pe fiecare cifră
      (de regulă de la cea mai puțin semnificativă), obținând O(d·(n + k)) fără
      comparații directe între numere."
