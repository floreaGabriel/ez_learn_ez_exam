<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licență Trainer — Pregătire examen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // aplică tema salvată înainte de randare (fără flash): mod + variabile
    try{
      document.documentElement.dataset.theme = localStorage.getItem("app-theme-mode") || "dark";
      var _tv = localStorage.getItem("app-theme-vars");
      if(_tv){ _tv = JSON.parse(_tv); for(var _k in _tv){ document.documentElement.style.setProperty(_k, _tv[_k]); } }
    }catch(e){}
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <aside class="sidebar">
    <div class="brand" onclick="showDashboard(); closeSidebar()" style="cursor:pointer">
      <h1>Licență Trainer 🎓</h1>
      <div class="sub">Pregătire examen de licență</div>
      <span class="pill">Materii</span>
    </div>
    <div id="nav"></div>
    <div id="live-stats" class="live-stats" aria-live="polite"></div>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <div class="main">
    <div class="topbar">
      <button class="nav-toggle" id="navToggle" aria-label="Meniu" aria-expanded="false" onclick="toggleSidebar()">☰</button>
      <div class="topbar-titles">
        <div class="crumb" id="crumb">Pregătire licență</div>
        <h2 id="title">Acasă</h2>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="themePicker" title="Selector de teme (100+)" onclick="openThemePicker()">🎨</button>
        <button class="theme-toggle" id="themeToggle" title="Comută tema (dark/light)" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <!-- date -->
  <script src="js/data/concepte.js"></script>
  <script src="js/data/intrebari.js"></script>
  <!-- subiecte generate (modele de examen) -->
  <script src="js/data/subiecte.js"></script>
  <script src="js/data/exam-1.js"></script>
  <script src="js/data/exam-2.js"></script>
  <script src="js/data/exam-3.js"></script>
  <script src="js/data/exam-4.js"></script>
  <script src="js/data/exam-5.js"></script>
  <!-- teme (selector 100+) -->
  <script src="js/data/palettes.js"></script>
  <script src="js/theme.js"></script>
  <!-- logica -->
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
  <!-- Joacă cu prietenii (Conquistador) — multiplayer prin WebSocket la /game/ -->
  <script src="js/conq-audio.js"></script>
  <script src="js/conquistador.js"></script>
  <!-- contor live + total (opțional; se ascunde dacă backendul nu răspunde) -->
  <script src="js/stats.js"></script>
</body>
</html>
