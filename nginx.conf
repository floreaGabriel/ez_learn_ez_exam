# ============================================================
#  Anti-bot (context http) — vezi blocul server de mai jos
# ============================================================
# Boturi headless / de scripting: le marcăm după User-Agent ca să le respingem.
# Atacul observat în loguri folosea exclusiv "HeadlessChrome".
map $http_user_agent $bad_bot {
    default            0;
    "~*HeadlessChrome" 1;
    "~*[Hh]eadless"    1;
    "~*PhantomJS"      1;
    "~*[Ss]elenium"    1;
    "~*[Pp]uppeteer"   1;
    "~*[Pp]laywright"  1;
    "~*python-requests" 1;
    "~*curl/"          1;
    "~*[Ss]crapy"      1;
    ""                 1;   # cerere fără User-Agent = aproape mereu bot
}

# Limită de cereri pentru /api/, după IP-ul REAL al clientului (vezi real_ip
# mai jos). 10m de zonă ~ 160k IP-uri ținute în memorie.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# Limită pentru /sqlapi/ (Interogare Live). Mai permisivă: un user care se
# joacă poate trimite multe SELECT-uri la rând. 90 cereri/min per IP.
limit_req_zone $binary_remote_addr zone=sql_limit:10m rate=90r/m;

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Diacriticele românești se afișează corect
    charset utf-8;

    # --- IP-ul real al clientului ---
    # În spatele Tailscale Funnel + Docker, $remote_addr e mereu gateway-ul
    # (172.19.0.1), deci inutil pentru filtrare. IP-ul real vine în
    # X-Forwarded-For. real_ip îl reconstituie => logare + rate-limit corecte.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # --- Respinge boturile headless pentru TOT site-ul ---
    # (nu doar /api/) — așa nu mai încarcă nici pagina, economisești și bandă.
    if ($bad_bot) { return 403; }

    # Compresie pentru text (HTML/CSS/JS/SVG)
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache lung pentru resurse statice; HTML fără cache (să iei mereu ultima versiune)
    location ~* \.(?:css|js|png|jpg|jpeg|svg|woff2?|mp3)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    # Orice index.html (rădăcina + paginile embed: pso/, oop/, sql/, sda/ …):
    # no-cache, ca referințele versionate (?v=<sha>) să ajungă imediat la useri.
    location ~* /index\.html$ {
        add_header Cache-Control "no-cache";
    }

    # API contor (live + total) — proxy către serviciul "counter" din compose.
    # Resolver-ul Docker (127.0.0.11) + upstream în variabilă => nginx pornește
    # chiar dacă serviciul counter urcă mai târziu (rezolvare la cerere, nu la boot).
    location /api/ {
        # Max 30 cereri/min per IP, cu rafală scurtă de 10. Un vizitator real
        # face ~5/min (un /hit la încărcare + /ping la 15s), deci nu e afectat;
        # un bot care spamează contorul primește 429.
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        resolver 127.0.0.11 valid=30s;
        set $counter_upstream counter;
        proxy_pass http://$counter_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    # API "Interogare Live" — proxy către serviciul "sqlrunner".
    # Acesta rulează SELECT-urile colegilor ca user read-only pe Azure SQL Edge.
    location /sqlapi/ {
        # Max 90 cereri/min per IP, cu rafală de 20 (cineva care testează rapid).
        limit_req zone=sql_limit burst=20 nodelay;
        limit_req_status 429;

        resolver 127.0.0.11 valid=30s;
        set $sql_upstream sqlrunner;
        proxy_pass http://$sql_upstream:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 3s;
        # interogările pot dura puțin (timeout-ul real e impus în sqlrunner)
        proxy_read_timeout 15s;
    }

    # Joc multiplayer "Joacă cu prietenii" (Conquistador) — proxy WebSocket
    # către serviciul "conquistador". Are nevoie de upgrade HTTP/1.1 -> ws.
    # Tailscale Funnel transmite corect upgrade-ul WebSocket.
    location /game/ {
        resolver 127.0.0.11 valid=30s;
        set $game_upstream conquistador;
        proxy_pass http://$game_upstream:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # handshake WebSocket
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;                    # ținem conexiunea deschisă (heartbeat la 30s)
        proxy_send_timeout 3600s;
    }

    # Joc multiplayer "Among Us CS" — serviciul Node servește ȘI clientul
    # (HTML/JS/canvas) ȘI WebSocket-ul jocului (/amongus/ws), din aceeași
    # imagine => client și server mereu sincronizați pe protocol.
    # ^~ e OBLIGATORIU: fără el, locația REGEX de cache static (\.js$ etc.)
    # ar avea prioritate peste acest prefix și ar căuta /amongus/*.js ca
    # fișiere statice în imaginea site-ului => 404.
    location ^~ /amongus/ {
        resolver 127.0.0.11 valid=30s;
        set $amongus_upstream amongus;
        proxy_pass http://$amongus_upstream:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # handshake WebSocket
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;                    # heartbeat la 30s ține conexiunea vie
        proxy_send_timeout 3600s;
    }

    # Rețelistan — serverul de PREZENȚĂ online al jocului de teorie (Rețele).
    # Doar WebSocket (/retelistan/ws): nume + poziții, ca jucătorii să se vadă
    # unii pe alții pe hartă. Clientul jocului e servit STATIC din imaginea
    # site-ului (retele/harta/game.js). ^~ din același motiv ca la /amongus/.
    location ^~ /retelistan/ {
        resolver 127.0.0.11 valid=30s;
        set $retelistan_upstream retelistan;
        proxy_pass http://$retelistan_upstream:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # handshake WebSocket
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;                    # heartbeat la 30s ține conexiunea vie
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
