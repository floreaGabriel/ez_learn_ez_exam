server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Diacriticele românești se afișează corect
    charset utf-8;

    # Compresie pentru text (HTML/CSS/JS/SVG)
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache lung pentru resurse statice; HTML fără cache (să iei mereu ultima versiune)
    location ~* \.(?:css|js|png|jpg|jpeg|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API contor (live + total) — proxy către serviciul "counter" din compose.
    # Resolver-ul Docker (127.0.0.11) + upstream în variabilă => nginx pornește
    # chiar dacă serviciul counter urcă mai târziu (rezolvare la cerere, nu la boot).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $counter_upstream counter;
        proxy_pass http://$counter_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
