<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Minute — Recapitulare finală (protejat)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
/* aplică tema salvată înainte de paint (fără flash) */
(function(){try{
  var m=localStorage.getItem('recap-theme')||localStorage.getItem('app-theme-mode')||'dark';
  document.documentElement.dataset.theme=m;
  var v=localStorage.getItem('app-theme-vars');
  if(v){ var o=JSON.parse(v), s=document.documentElement.style; for(var k in o) s.setProperty(k,o[k]); }
}catch(e){}})();
</script>
<style>
:root{
  --bg:#1a1714; --panel:#221e1a; --panel2:#2a2521; --topbar:#1d1916;
  --ink:#ece3d2; --ink-soft:#d6cbb6; --muted:#a8997f; --line:#352f28; --line2:#403930;
  --accent:#e9b143; --accent-2:#d8843f; --blue:#83a598; --green:#b8bb26; --red:#fb4934;
  --purple:#d3869b; --aqua:#8ec07c; --code-bg:#14110d;
  --mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html[data-theme="light"]{
  --bg:#f3ecdd; --panel:#fbf6ea; --panel2:#f1e8d6; --topbar:#f7f1e3;
  --ink:#2a2118; --ink-soft:#4a3f30; --muted:#8a7a5f; --line:#ddd0b8; --line2:#cdbf9f;
  --accent:#bf8b1d; --accent-2:#c46a2a; --blue:#076678; --green:#79740e; --red:#c23a2e;
  --purple:#8f3f71; --aqua:#427b58; --code-bg:#efe6d2;
}
*{box-sizing:border-box; margin:0; padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans); color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; -webkit-font-smoothing:antialiased}
.wrap{max-width:1020px; margin:0 auto; padding:24px 30px 120px}

.bar{display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; padding-bottom:14px; border-bottom:1px solid var(--line)}
.brand{font-size:21px; font-weight:700; letter-spacing:.3px; color:var(--ink)}
.brand span{color:var(--muted); font-weight:500}
.bar .sub{color:var(--muted); font-size:13px}
.bar .act{margin-left:auto; display:flex; gap:8px}
.bar .mini{appearance:none; cursor:pointer; font-family:var(--sans); font-size:12px; color:var(--muted);
  background:transparent; border:1px solid var(--line2); border-radius:7px; padding:4px 10px; white-space:nowrap}
.bar .mini:hover{color:var(--accent); border-color:var(--accent)}

.page{animation:fade .25s ease}
@keyframes fade{from{opacity:0; transform:translateY(5px)}to{opacity:1; transform:none}}
.muted{color:var(--muted)}
code{font-family:var(--mono); font-size:.9em; background:var(--panel2); padding:1px 5px; border-radius:4px; color:var(--ink-soft)}

/* ---- ecranul de deblocare ---- */
.lock{max-width:430px; margin:9vh auto 0; text-align:center}
.lock .ico{font-size:44px}
.lock h2{font-size:19px; margin:12px 0 6px}
.lock p{font-size:13.5px; color:var(--muted); margin-bottom:18px}
.lock form{display:flex; flex-direction:column; gap:10px; text-align:left}
.lock input[type="password"]{font-family:var(--mono); font-size:15px; padding:11px 13px; background:var(--panel);
  color:var(--ink); border:1px solid var(--line2); border-radius:9px; width:100%}
.lock input[type="password"]:focus{outline:none; border-color:var(--accent)}
.lock label.rem{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted); cursor:pointer; user-select:none}
.lock .btn{width:100%}
.lock .err{display:none; font-size:13px; color:var(--red); background:color-mix(in srgb, var(--red) 12%, transparent);
  border:1px solid color-mix(in srgb, var(--red) 40%, transparent); border-radius:8px; padding:8px 12px}
.lock .err.on{display:block}
.lock .busy{display:none; font-size:12.5px; color:var(--muted)}
.lock .busy.on{display:block}
.lock .foot{margin-top:26px; font-size:11.5px; color:var(--muted); line-height:1.6}

.btn{appearance:none; font-family:var(--sans); font-size:13.5px; font-weight:600; cursor:pointer;
  border:1px solid var(--accent); background:var(--accent); color:var(--bg); padding:9px 16px; border-radius:8px}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent; color:var(--ink-soft); border-color:var(--line2)}
.btn.ghost:hover{border-color:var(--accent); color:var(--ink)}
.btn:disabled{opacity:.5; cursor:default}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}

/* ---- acasă: hero + cardurile materiilor ---- */
h2.pagetitle{font-size:19px; margin:18px 0 4px}
.lead{color:var(--muted); font-size:13.5px; margin:2px 0 18px; max-width:88ch}
.exam-strip{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 18px}
.exam-strip .seg{font-size:12px; color:var(--ink-soft); background:var(--panel); border:1px solid var(--line2);
  border-radius:8px; padding:5px 11px}
.exam-strip .seg b{color:var(--accent)}
.mgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px}
.mcard{text-align:left; cursor:pointer; font-family:var(--sans); background:var(--panel);
  border:1px solid var(--line2); border-radius:12px; padding:15px 16px; display:flex; flex-direction:column; gap:8px;
  transition:transform .16s ease, border-color .16s ease}
.mcard:hover{transform:translateY(-3px); border-color:var(--accent)}
.mcard .head{display:flex; align-items:center; gap:10px}
.mcard .micon{font-size:24px}
.mcard h3{font-size:15px; color:var(--ink); font-weight:700; line-height:1.3}
.mcard p{font-size:12.5px; color:var(--muted); line-height:1.5; margin:0}
.prog{display:flex; align-items:center; gap:8px; margin-top:auto; padding-top:4px}
.prog .track{flex:1; height:6px; border-radius:4px; background:var(--panel2); overflow:hidden}
.prog .fill{height:100%; border-radius:4px; background:var(--accent); width:0%}
.prog .pct{font-family:var(--mono); font-size:10.5px; color:var(--muted); white-space:nowrap}

/* ---- pagina unei materii ---- */
.mhead{display:flex; align-items:center; gap:12px; margin:16px 0 2px}
.mhead .micon{font-size:30px}
.mhead h2{font-size:20px}
.chips{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 2px}
.chip{appearance:none; cursor:pointer; font-family:var(--sans); font-size:12.5px; font-weight:600;
  color:var(--ink-soft); background:var(--panel); border:1px solid var(--line2); border-radius:20px; padding:6px 14px}
.chip:hover{border-color:var(--accent); color:var(--ink)}
.chip.on{background:var(--accent); border-color:var(--accent); color:var(--bg)}

/* ---- articolul ---- */
.article{background:var(--panel); border:1px solid var(--line); padding:26px 30px; border-radius:14px; margin-top:14px}
.article h2{font-size:20px; margin:0 0 14px; padding-bottom:8px; border-bottom:2px solid var(--line); color:var(--accent); font-weight:700}
.article h3{font-size:16px; margin:24px 0 8px; color:var(--ink); font-weight:700}
.article h3:first-child{margin-top:2px}
.article h4{font-size:14.5px; margin:14px 0 6px; color:var(--ink)}
.article p{margin:11px 0; color:var(--ink-soft); font-size:14px; line-height:1.65}
.article ul,.article ol{margin:11px 0 11px 24px}
.article li{margin:7px 0; color:var(--ink-soft); font-size:14px; line-height:1.6}
.article b{color:var(--ink); font-weight:600}
.subq{margin:14px 0 6px; font-weight:600; color:var(--ink)}
ul.tldr{list-style:none; margin-left:0 !important}
ul.tldr li{margin:9px 0; padding:9px 13px; background:var(--panel2); border:1px solid var(--line);
  border-left:3px solid var(--accent); border-radius:8px; font-size:13.5px}
ul.tldr li b{color:var(--accent)}
pre.code{font-family:var(--mono); font-size:12.8px; line-height:1.55; background:var(--code-bg); color:var(--ink-soft);
  border:1px solid var(--line); border-radius:10px; padding:14px 16px; overflow:auto; white-space:pre; tab-size:4; margin:12px 0}
.tok-key{color:var(--accent); font-weight:600}
.tok-fn{color:var(--blue)}
.tok-str{color:var(--green)}
.tok-com{color:var(--muted); font-style:italic}
.tok-num{color:var(--purple)}
.tok-pre{color:var(--aqua)}
.hint{margin:12px 0; padding:11px 14px; font-size:13.5px; color:var(--ink-soft); background:color-mix(in srgb, var(--accent) 8%, transparent);
  border:1px solid color-mix(in srgb, var(--accent) 35%, transparent); border-radius:10px}
.hint b{color:var(--accent)}
.trap{margin:14px 0; padding:12px 15px; font-size:13.5px; color:var(--ink-soft); background:color-mix(in srgb, var(--red) 7%, transparent);
  border:1px solid color-mix(in srgb, var(--red) 32%, transparent); border-radius:10px}
.trap>b{display:block; color:var(--red); margin-bottom:4px}
.trap p{margin:7px 0}
details.rezolvare{margin:16px 0 8px; border:1px solid var(--line2); border-radius:11px; background:var(--panel2); overflow:hidden}
details.rezolvare>summary{cursor:pointer; padding:12px 16px; font-weight:600; color:var(--accent); font-size:14px; list-style:none; user-select:none}
details.rezolvare>summary::-webkit-details-marker{display:none}
details.rezolvare>summary::before{content:"▸  "; font-size:11px}
details.rezolvare[open]>summary::before{content:"▾  "}
details.rezolvare[open]>summary{border-bottom:1px solid var(--line)}
details.rezolvare>summary:hover{color:var(--accent-2)}
.rez-body{padding:6px 18px 16px; color:var(--ink-soft); font-size:14px}
.rez-body h4{color:var(--ink); margin:14px 0 6px; font-size:14.5px}
.rez-body h4:first-child{margin-top:6px}
.rez-body p{font-size:13.5px}
table.tbl{width:100%; border-collapse:collapse; font-size:12.5px; margin:8px 0}
.tbl th{text-align:left; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.4px; padding:5px 8px; border-bottom:1px solid var(--line)}
.tbl td{padding:5px 8px; border-bottom:1px solid var(--line); vertical-align:top}
.tbl tr:last-child td{border-bottom:none}

/* ---- checklist ---- */
label.ck{display:flex; align-items:flex-start; gap:10px; margin:8px 0; padding:10px 13px; cursor:pointer; user-select:none;
  background:var(--panel2); border:1px solid var(--line); border-radius:9px; font-size:13.5px; color:var(--ink-soft);
  transition:border-color .15s ease}
label.ck:hover{border-color:var(--accent)}
label.ck input{margin-top:3px; accent-color:var(--accent); width:15px; height:15px; flex:none}
label.ck.done{border-color:color-mix(in srgb, var(--green) 45%, transparent); background:color-mix(in srgb, var(--green) 7%, transparent)}
label.ck.done span{text-decoration:line-through; color:var(--muted)}
.ck-tools{display:flex; align-items:center; gap:12px; margin:16px 0 4px}
.ck-tools .mini{appearance:none; cursor:pointer; font-family:var(--sans); font-size:12px; color:var(--muted);
  background:transparent; border:1px solid var(--line2); border-radius:7px; padding:4px 10px}
.ck-tools .mini:hover{color:var(--red); border-color:var(--red)}

@media(max-width:680px){
  .wrap{padding:18px 14px 90px}
  .article{padding:18px 14px}
  .tbl{display:block; overflow-x:auto; white-space:nowrap}
}
@media(prefers-reduced-motion:reduce){ .page{animation:none} .mcard{transition:none} }
</style>

<body>
<div class="wrap">

  <header class="bar">
    <div class="brand">⏰ Last Minute <span>· Recapitulare finală</span></div>
    <div class="sub">Esențialul din toate materiile — concepte, capcane, checklist — înainte de examen</div>
    <div class="act" id="actiuni" style="display:none">
      <button class="mini" id="btnLock">🔒 Blochează</button>
      <button class="mini" id="btnForget">Uită parola de pe stație</button>
    </div>
  </header>

  <div id="content"></div>

</div>

<script src="recap-secret.enc.js"></script>
<script>
"use strict";

/* ============================================================
   Last Minute — deblocare cu parolă + randare recapitulare.
   Datele stau criptate în RECAP_SECRET (AES-GCM-256; cheia derivată
   din parolă cu PBKDF2-SHA256) — aceeași parolă ca subiectele PSO/OOP/SDA.
   ============================================================ */

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

var C_KW = ["int","char","void","bool","const","static","struct","class","public","private","protected","return",
"if","else","for","while","do","unsigned","signed","long","short","float","double","new","delete","virtual",
"switch","case","break","continue","default","sizeof","typedef","union","enum","goto","extern","volatile",
"true","false","NULL","nullptr","size_t","ssize_t","pid_t","pthread_t","sem_t","pthread_mutex_t","template",
"typename","using","namespace","this","throw","try","catch","operator","friend","inline","auto",
"SELECT","FROM","WHERE","JOIN","INNER","LEFT","RIGHT","ON","GROUP","BY","HAVING","ORDER","ASC","DESC","TOP",
"AND","OR","NOT","IN","IS","LIKE","BETWEEN","AS","DISTINCT","COUNT","SUM","AVG","MIN","MAX","WITH","TIES",
"INSERT","INTO","VALUES","UPDATE","SET","DELETE","CREATE","TABLE","VIEW","UNION","EXCEPT","INTERSECT"];
function highlightC(text){
  var store=[];
  function hold(cls,val){ store.push('<span class="'+cls+'">'+esc(val)+'</span>'); return String.fromCharCode(0xE000+store.length-1); }
  var s=text;
  s=s.replace(/\/\*[\s\S]*?\*\//g, function(m){ return hold("tok-com",m); });
  s=s.replace(/\/\/[^\n]*/g,        function(m){ return hold("tok-com",m); });
  s=s.replace(/--[^\n]*/g,          function(m){ return hold("tok-com",m); });
  s=s.replace(/"(?:[^"\\]|\\.)*"/g, function(m){ return hold("tok-str",m); });
  s=s.replace(/'(?:[^'\\]|\\.)*'/g, function(m){ return hold("tok-str",m); });
  s=s.replace(/^\s*#[^\n]*/gm,      function(m){ return hold("tok-pre",m); });
  s=esc(s);
  s=s.replace(/([A-Za-z_]\w*)([ \t]*\()?|0x[0-9A-Fa-f]+|\b\d+\b/g, function(m, ident, paren){
    if(ident===undefined) return '<span class="tok-num">'+m+'</span>';
    if(C_KW.indexOf(ident)>=0) return '<span class="tok-key">'+ident+'</span>'+(paren||"");
    if(paren) return '<span class="tok-fn">'+ident+'</span>'+paren;
    return ident;
  });
  s=s.replace(/[\uE000-\uF8FF]/g, function(ch){ return store[ch.charCodeAt(0)-0xE000]; });
  return s;
}
function applyHighlight(root){
  root.querySelectorAll("pre.code").forEach(function(pre){
    if(pre.dataset.hl) return;
    pre.dataset.hl="1";
    pre.innerHTML=highlightC(pre.textContent);
  });
}

/* ---------- criptografie ---------- */
function b64ToU8(b64){
  var bin=atob(b64), u8=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  return u8;
}
function decripteaza(parola){
  var enc=new TextEncoder();
  return crypto.subtle.importKey("raw", enc.encode(parola), "PBKDF2", false, ["deriveKey"])
    .then(function(km){
      return crypto.subtle.deriveKey(
        { name:"PBKDF2", salt:b64ToU8(RECAP_SECRET.salt), iterations:RECAP_SECRET.iter, hash:"SHA-256" },
        km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
    })
    .then(function(key){
      return crypto.subtle.decrypt({ name:"AES-GCM", iv:b64ToU8(RECAP_SECRET.iv) }, key, b64ToU8(RECAP_SECRET.ct));
    })
    .then(function(buf){
      return JSON.parse(new TextDecoder().decode(buf));
    });
}

/* ---------- stare ---------- */
var DATE=null;   /* {materii:[...]} după deblocare */
var PASSKEY="recap-pass";
/* aceeași parolă e folosită și de paginile de subiecte — dacă e ținută minte
   acolo, o încercăm automat și aici (deblocare transparentă) */
var ALT_KEYS=["recap-pass","psosub-pass","oopsub-pass","sdasub-pass"];

function parolaSalvata(){ try{ return localStorage.getItem(PASSKEY); }catch(e){ return null; } }
function paroleCandidate(){
  var out=[];
  ALT_KEYS.forEach(function(k){
    try{ var p=localStorage.getItem(k); if(p && out.indexOf(p)<0) out.push(p); }catch(e){}
  });
  return out;
}
function salveazaParola(p){ try{ localStorage.setItem(PASSKEY,p); }catch(e){} }
function uitaParola(){ try{ localStorage.removeItem(PASSKEY); }catch(e){} }

/* ---------- checklist persistent (per stație) ---------- */
var CK_KEY="recap-check-v1";
function getCk(){ try{ return JSON.parse(localStorage.getItem(CK_KEY)||"{}")||{}; }catch(e){ return {}; } }
function setCk(o){ try{ localStorage.setItem(CK_KEY, JSON.stringify(o)); }catch(e){} }

function nrCkSectiune(html){ return (html.match(/<input type="checkbox">/g)||[]).length; }
function progresMaterie(m){
  var store=getCk(), total=0, done=0;
  m.sectiuni.forEach(function(s){
    var n=nrCkSectiune(s.html);
    total+=n;
    for(var i=0;i<n;i++) if(store[m.id+":"+s.id+":"+i]) done++;
  });
  return { total:total, done:done };
}

/* ---------- vederi ---------- */
function q(id){ return document.getElementById(id); }
function materie(id){
  var out=null;
  DATE.materii.forEach(function(m){ if(m.id===id) out=m; });
  return out;
}

function renderLock(autoTry){
  q("actiuni").style.display="none";
  DATE=null;
  var c=q("content");
  c.innerHTML=''
    +'<div class="page lock">'
    +'<div class="ico">⏰🔐</div>'
    +'<h2>Recapitulare finală — secțiune protejată</h2>'
    +'<p>Conținutul e criptat. Parola e aceeași ca la subiectele de examen (PSO / OOP / SDA).</p>'
    +'<form id="lockForm">'
    +'<input type="password" id="parola" placeholder="parola" autocomplete="current-password" autofocus>'
    +'<label class="rem"><input type="checkbox" id="tineMinte" checked> ține minte parola pe această stație</label>'
    +'<div class="err" id="lockErr">Parolă greșită — conținutul nu a putut fi decriptat.</div>'
    +'<div class="busy" id="lockBusy">Se decriptează…</div>'
    +'<button class="btn" type="submit" id="lockBtn">Deblochează</button>'
    +'</form>'
    +'<div class="foot">Conținutul este criptat AES-256; parola nu este stocată nicăieri pe server.<br>'
    +'Dacă ai bifat „ține minte” la subiectele PSO/OOP/SDA, pagina se deblochează singură.</div>'
    +'</div>';
  q("lockForm").addEventListener("submit", function(e){
    e.preventDefault();
    incearca([q("parola").value], q("tineMinte").checked, false);
  });
  try{ q("parola").focus(); }catch(e){}
  if(autoTry){
    var cand=paroleCandidate();
    if(cand.length){ q("lockBusy").classList.add("on"); incearca(cand, true, true); }
  }
}

/* încearcă pe rând o listă de parole candidate */
function incearca(parole, tineMinte, dinSalvat){
  parole=(parole||[]).filter(function(p){ return !!p; });
  if(!parole.length) return;
  var btn=q("lockBtn"), err=q("lockErr"), busy=q("lockBusy");
  if(btn) btn.disabled=true;
  if(err) err.classList.remove("on");
  if(busy) busy.classList.add("on");
  var i=0;
  function next(){
    if(i>=parole.length){
      if(dinSalvat) uitaParola();   /* parola salvată nu mai e bună (blob recriptat) */
      if(busy) busy.classList.remove("on");
      if(btn) btn.disabled=false;
      if(err && !dinSalvat) err.classList.add("on");
      return;
    }
    var p=parole[i++];
    decripteaza(p).then(function(date){
      DATE=date;
      if(tineMinte) salveazaParola(p);
      routeFromHash();
    }).catch(next);
  }
  next();
}

function renderAcasa(){
  q("actiuni").style.display="";
  var c=q("content");
  var tot=0, done=0;
  DATE.materii.forEach(function(m){ var p=progresMaterie(m); tot+=p.total; done+=p.done; });
  var pct=tot?Math.round(done*100/tot):0;
  var html='<div class="page"><h2 class="pagetitle">Recapitularea de dinaintea examenului</h2>'
    +'<p class="lead">Pentru fiecare materie: <b>⚡ Esențialul</b> (tot, pe scurt), <b>📌 Conceptele</b> explicate ca la examen, '
    +'<b>🪤 Capcanele</b> care pică lumea și un <b>✅ Checklist</b> pe care îl bifezi pe măsură ce știi. '
    +'Bifele se salvează pe stația asta — progresul de mai jos e al tău. Totul e extras din cursurile PDF și din platformă.</p>'
    +'<div class="exam-strip">'
    +'<span class="seg"><b>Subiectul I</b> · Rețele (10p)</span>'
    +'<span class="seg"><b>Subiectul II</b> · PSO — cod C + 6 întrebări (10p)</span>'
    +'<span class="seg"><b>Subiectul III</b> · C / C++ / SDA (10p)</span>'
    +'<span class="seg">+ Arhitecturi (doar C4) · SQL</span>'
    +'<span class="seg">Progres total: <b>'+pct+'%</b></span>'
    +'</div>'
    +'<div class="mgrid">';
  DATE.materii.forEach(function(m){
    var p=progresMaterie(m), pc=p.total?Math.round(p.done*100/p.total):0;
    html+='<button class="mcard" data-m="'+esc(m.id)+'">'
      +'<span class="head"><span class="micon">'+m.icon+'</span><h3>'+esc(m.nume)+'</h3></span>'
      +'<p>'+esc(m.tagline)+'</p>'
      +'<span class="prog"><span class="track"><span class="fill" style="width:'+pc+'%"></span></span>'
      +'<span class="pct">'+p.done+'/'+p.total+' bifate</span></span>'
      +'</button>';
  });
  html+='</div></div>';
  c.innerHTML=html;
  c.querySelectorAll(".mcard").forEach(function(b){
    b.onclick=function(){ location.hash="m/"+b.dataset.m; };
  });
}

function renderMaterie(id, secId){
  var m=materie(id);
  if(!m){ location.hash="acasa"; return; }
  var idx=DATE.materii.indexOf(m), prev=DATE.materii[idx-1], next=DATE.materii[idx+1];
  var sec=null;
  m.sectiuni.forEach(function(s){ if(s.id===secId) sec=s; });
  if(!sec) sec=m.sectiuni[0];
  q("actiuni").style.display="";
  var c=q("content");

  var chips='<div class="chips">';
  m.sectiuni.forEach(function(s){
    chips+='<button class="chip'+(s.id===sec.id?" on":"")+'" data-sec="'+esc(s.id)+'">'+esc(s.titlu)+'</button>';
  });
  chips+='</div>';

  var nav='<div class="btn-row" style="justify-content:space-between; margin-top:22px">'
    +(prev?'<button class="btn ghost" data-go="m/'+esc(prev.id)+'">← '+prev.icon+' '+esc(prev.nume)+'</button>':'<span></span>')
    +(next?'<button class="btn" data-go="m/'+esc(next.id)+'">'+next.icon+' '+esc(next.nume)+' →</button>'
          :'<button class="btn ghost" data-go="acasa">↩ Toate materiile</button>')
    +'</div>';

  c.innerHTML='<div class="page">'
    +'<div class="btn-row" style="margin-top:14px"><button class="btn ghost" data-go="acasa">← Toate materiile</button></div>'
    +'<div class="mhead"><span class="micon">'+m.icon+'</span><h2>'+esc(m.nume)+'</h2></div>'
    +'<p class="lead" style="margin-top:2px">'+esc(m.tagline)+'</p>'
    +chips
    +'<article class="article"><h2>'+esc(sec.titlu)+'</h2>'+sec.html+'</article>'
    +nav+'</div>';

  applyHighlight(c);
  bindChecklist(c.querySelector(".article"), m, sec);
  c.querySelectorAll("[data-go]").forEach(function(b){
    b.onclick=function(){ location.hash=b.dataset.go; };
  });
  c.querySelectorAll(".chip").forEach(function(b){
    b.onclick=function(){ location.hash="m/"+m.id+"/"+b.dataset.sec; };
  });
  window.scrollTo({top:0, behavior:"smooth"});
}

/* leagă checkbox-urile dintr-o secțiune de localStorage (chei m:sec:idx) */
function bindChecklist(root, m, sec){
  if(!root) return;
  var labels=root.querySelectorAll("label.ck");
  if(!labels.length) return;
  var store=getCk();
  labels.forEach(function(lab, i){
    var input=lab.querySelector('input[type="checkbox"]');
    if(!input) return;
    /* împachetează textul liber în <span> ca să-l putem tăia când e bifat */
    if(!lab.querySelector("span")){
      var span=document.createElement("span");
      while(input.nextSibling) span.appendChild(input.nextSibling);
      lab.appendChild(span);
    }
    var key=m.id+":"+sec.id+":"+i;
    input.checked=!!store[key];
    lab.classList.toggle("done", input.checked);
    input.addEventListener("change", function(){
      var s=getCk();
      if(input.checked) s[key]=1; else delete s[key];
      setCk(s);
      lab.classList.toggle("done", input.checked);
    });
  });
  /* buton de reset doar unde există bife */
  var tools=document.createElement("div");
  tools.className="ck-tools";
  tools.innerHTML='<button class="mini" type="button">↺ Resetează bifele din această secțiune</button>';
  tools.querySelector("button").onclick=function(){
    var s=getCk();
    labels.forEach(function(lab, i){ delete s[m.id+":"+sec.id+":"+i]; });
    setCk(s);
    labels.forEach(function(lab){
      var input=lab.querySelector("input"); if(input) input.checked=false;
      lab.classList.remove("done");
    });
  };
  root.appendChild(tools);
}

/* ---------- rutare ---------- */
function routeFromHash(){
  if(!DATE){ renderLock(true); return; }
  var t=(location.hash||"").replace(/^#/,"");
  var mm=t.match(/^m\/([a-z0-9-]+)(?:\/([a-z0-9-]+))?$/);
  if(mm) renderMaterie(mm[1], mm[2]);
  else renderAcasa();
}
window.addEventListener("hashchange", routeFromHash);

function activateTab(tab){
  var target=(tab && tab!=="lista" && tab!=="acasa")?tab:"acasa";
  if(("#"+target)===location.hash) routeFromHash();
  else location.hash=target;
}

/* ---------- acțiuni header ---------- */
document.addEventListener("DOMContentLoaded", function(){
  q("btnLock").onclick=function(){ renderLock(false); };
  q("btnForget").onclick=function(){ uitaParola(); renderLock(false); };
  routeFromHash();
});

/* ---------- temă (contract cu aplicația-gazdă) ---------- */
function setTheme(t){ document.documentElement.dataset.theme=t; try{ localStorage.setItem("recap-theme",t); }catch(e){} }
function applyThemeVars(v){
  var ds=document.documentElement.style,
      K=["--bg","--bg2","--bg3","--sidebar","--panel","--panel2","--topbar","--ink","--ink-soft","--txt","--muted",
         "--line","--line2","--border","--accent","--accent-2","--accent2","--green","--good","--red","--bad",
         "--blue","--purple","--aqua","--warn","--code-bg","--code-ink","--on-accent"];
  K.forEach(function(k){ ds.removeProperty(k); });
  if(v){ for(var k in v){ ds.setProperty(k, v[k]); } }
}
window.addEventListener("message", function(e){
  var d=e.data||{};
  if(d.type==="theme" && d.theme){ setTheme(d.theme); applyThemeVars(d.vars); }
  else if(d.type==="tab" && d.tab) activateTab(d.tab);
});
</script>
